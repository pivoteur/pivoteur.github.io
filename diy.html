<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol DIY Chart++</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="protocol.css?version=5">
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <img class="bg-watermark" src="imgs/pivot-logo-sillo-nior.png" alt="">

  <main>

    <div class="diy-layout">

      <div class="diy-charts">
        <div class="panel" style="margin-bottom:0;">
          <div class="panel-head" style="display:flex; align-items:center; justify-content:space-between;">
            <span>Pivot Chart</span>
            <span id="recommendation" class="call-text"></span>
            <div style="display:flex; gap:4px;">
              <button class="range-btn active" data-days="30">1M</button>
              <button class="range-btn" data-days="90">3M</button>
              <button class="range-btn" data-days="0">MAX</button>
            </div>
          </div>
          <div style="padding:12px 14px; height:340px;">
            <canvas id="pivotChart" width="900" height="240"></canvas>
          </div>
        </div>

        <div class="panel" style="margin-bottom:0;">
          <div class="panel-head">
            <span>Delta</span>
          </div>
          <div style="padding:12px 14px; height:340px;">
            <canvas id="deltaChart" width="900" height="240"></canvas>
          </div>
        </div>
      </div>

      <div class="diy-sidebar">

        <div class="panel side-box">
          <div class="panel-head">Select Pair</div>
          <div style="display:flex; gap:6px; margin-bottom:6px;">
            <select id="token1" class="styled-select" onchange="selected(this)" style="flex:1;"></select>
            <select id="token2" class="styled-select" style="flex:1;"></select>
          </div>
          <button class="btn-primary" onclick="go()" style="width:100%;">DIY</button>
        </div>

        <div class="panel side-box">
          <div class="panel-head">Pivot Swap</div>
          <div class="side-field">
            <label id="label1">Label A</label>
            <input type="text" id="field1" value="Value 1" onChange="recompute()">
            <div id="amount1" class="sub" style="margin-top:4px; font-size:11px;">$1000.00</div>
          </div>
          <div class="side-field">
            <label id="label2">Label B</label>
            <span id="field2" class="value-display">Value 2</span>
          </div>
          <button id="rotateBtn" class="rotate-btn" onclick="swapValues()">🔄 Flip</button>
        </div>

      </div>

    </div>

    <p style="margin-top:10px;">
      <a href='#'
         onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#pivot-arbitrage";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about pivot arbitrage.
    </p>
  </main>

    <script src="libs/usd.js"></script>
    <script src="libs/indicators.js"></script>
    <script src="libs/table.js"></script>
    <script src="libs/pivots.js"></script>
    <script src="libs/canvas-bg.js"></script>
    <script src='libs/charts/line.js'></script>
    <script src="libs/charts/pivot.js"></script>
    <script src='libs/dom.js'></script>
    <script src='libs/pool-assets.js'></script>
    <script>
const swapValues = () => {
  [f1.value, f2.innerText] = [f2.innerText, f1.value];
  [l1.innerText, l2.innerText] = [l2.innerText, l1.innerText];
};

const removeOptions = selectElement => {
   var i, L = selectElement.options.length - 1;
   for(i = L; i >= 0; i--) {
      selectElement.remove(i);
   }
};

const refreshOptions = tok1 => {
   let t2 = document.getElementById('token2');
   removeOptions(t2);
   let top = prices[tok1];
   for (tok in prices) {
      if (prices[tok] < top || tok === 'USDC') {
         t2.options.add(new Option(tok, tok));
      }
   }
};

const selected = selectElement => {
   refreshOptions(selectElement.value);
};

const go = () => {
   let val1 = document.getElementById('token1').value;
   let val2 = document.getElementById('token2').value;
   location.href = "diy.html?t1=" + val1 + "&t2=" + val2;
};

let prices = {};
let currentTable = null;
let currentIdx = null;
let currentDays = 30; // matches the "1M" button marked active by default
let [t1, t2] = Object.values(params());
if (!t1 || t1 === 'undefined') { t1 = 'BTC'; }
if (!t2 || t2 === 'undefined') { t2 = 'ETH'; }
  const f1 = document.getElementById('field1');
  const f2 = document.getElementById('field2');
  const l1 = document.getElementById('label1');
  const l2 = document.getElementById('label2');
  const a1 = document.getElementById('amount1');

        fetch(pivotsUrl).then(response => {
           if (!response.ok) throw new Error('HTTP ' + response.status + ' loading ' + pivotsUrl);
           return response.text();
        }).then(data => {
   let [table, idx] = pivotTable(data);
   currentTable = table;
   currentIdx = idx;

   // Hide range buttons asking for more history than the data actually has —
   // showing "2Y" when only 8 months of data exists would be misleading, not
   // just unhelpful.
   const earliestDate = new Date(table[0][idx['date']]);
   const latestDate = new Date(table[table.length - 1][idx['date']]);
   const spanDays = Math.round((latestDate - earliestDate) / (1000 * 60 * 60 * 24));

   let activeBtnStillValid = true;
   document.querySelectorAll('.range-btn').forEach(btn => {
      const btnDays = parseInt(btn.dataset.days, 10);
      if (btnDays !== 0 && btnDays > spanDays) {
         btn.style.display = 'none';
         if (btn.classList.contains('active')) activeBtnStillValid = false;
      }
   });
   // If the default-active range (1M) got hidden because there isn't enough
   // data, fall back to MAX instead of rendering against a hidden/invalid button.
   // MAX is a fixed 100-day window here, not "every row" — if the table has
   // fewer than 100 rows total, slicing 100 naturally returns everything anyway.
   if (!activeBtnStillValid) {
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      const maxBtn = document.querySelector('.range-btn[data-days="0"]');
      if (maxBtn) maxBtn.classList.add('active');
      currentDays = 100;
   }

   let currentPrices = table[table.length - 1];
   let tag1 = document.getElementById('token1');
   let tag2 = document.getElementById('token2');
   let tokens = assets(poolAssets['assets']);
   for (const tok of Object.keys(idx)) {
      if(tokens.has(tok)) {
         tag1.options.add(new Option(tok, tok));
         prices[tok] = currentPrices[idx[tok]];
      }
   }
   let rev = pivotChartsTbl(t1, t2, table, idx, currentDays);
   tag1.value = t1;
   refreshOptions(t1);
   tag2.value = t2;

   let [a, b] = [t1, t2];
   if(rev) { [b, a] = [t1, t2]; }
   l1.innerText = a;
   l2.innerText = b;
   f1.value = round(1000.0 / prices[a]);
   f2.innerText = round(1000.0 / prices[b]);
}).catch(err => {
   console.error('diy.html swap panel failed:', err);
   const rec = document.getElementById('recommendation');
   if (rec) rec.innerHTML = '<span class="neg">Error: ' + err.message + '</span>';
});

const recompute = () => {
   let tot = prices[l1.innerText] * f1.value;
   let tot1 = Math.round(tot * 100)/100;
   a1.innerText = "$" + tot1;
   f2.innerText = round(tot1 / prices[l2.innerText]);
};

const round = amount => {
   let fix = 2;
   if(amount < 1) { fix = 4;
   } else if(amount < 0.01) { fix = 6;
   } else if(amount > 1000) { fix = 0; }
   return amount.toFixed(fix);
};

// ----- Range selector ---------------------------------------------------------------
document.querySelectorAll('.range-btn').forEach(btn => {
   btn.addEventListener('click', () => {
      if (!currentTable) return; // data hasn't loaded yet
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const days = parseInt(btn.dataset.days, 10);
      currentDays = days === 0 ? 100 : days; // 0 = MAX = fixed 100-day window

      const existingPivot = Chart.getChart('pivotChart');
      const existingDelta = Chart.getChart('deltaChart');
      if (existingPivot) existingPivot.destroy();
      if (existingDelta) existingDelta.destroy();

      pivotChartsTbl(t1, t2, currentTable, currentIdx, currentDays);
   });
});

    </script>
    <script src='libs/chrome.js'></script>
</body>
</html>
