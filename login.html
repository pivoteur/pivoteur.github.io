<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pivot Protocol Portfolio</title>
    <link rel="stylesheet" href="protocol.css?version=2">
    <style>
        .dialog-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5,8,16,0.6);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 70vh;
            overflow-y: auto;
            z-index: 1000;
        }
        .dialog-box {
            position: relative;
            z-index: 1;
            background-color: var(--surface);
            border: 1px solid var(--border-strong);
            padding: 28px 32px;
            border-radius: var(--radius);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
            text-align: center;
            min-width: 280px;
        }
        .dialog-box h2{
            font-size: 15px; text-align: left; margin-bottom: 16px;
        }
        .dialog-box p{ margin: 0; color: var(--text-dim); font-size: 13px; }
        .dialog-box input{
            margin: 10px 0; padding: 9px 12px; width: 100%; box-sizing: border-box;
            background: var(--surface-hover); border: 1px solid var(--border-strong);
            color: var(--text-bright); border-radius: var(--radius-sm); font-size: 13px;
        }
        .dialog-box input:focus{ outline:none; border-color: var(--teal-border); }
        .dialog-box button{
            padding: 9px 16px; background: var(--teal); color:#06201c;
            border: none; border-radius: var(--radius-sm); font-weight:600;
            font-size: 13px; cursor: pointer; width: 100%;
        }
        .dialog-box button:hover{ background:#3fc9ae; }
        /* This CSS block is page specific and not shared anywhere else, hence why it's defined here. */
    </style>
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="page-head">
      <h1>Profile</h1>
    </div>

    <div id="profileDialog" class="dialog-overlay">
        <img class="bg-watermark" src="imgs/pivot-logo-sillo-nior.png" alt="">
        <div class="dialog-box">
            <h2>Login</h2>
            <p>Profile:</p>
            <input type="text" id="profile" placeholder="none" onkeydown="if(event.key==='Enter') go()">
            <button id="submitProfile" onClick="go()">Continue</button>
        </div>
    </div>

    <p style="vertical-align: bottom;">
      <a href='#'
         onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#investing-into-the-pivot-protocol";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about staking.
    </p>
  </main>

 <script src="libs/pool-assets.js"></script>
 <script src='libs/chrome.js'></script>
 <script>

async function digestMessage(message) {
  const encoder = new TextEncoder(); 
  const data = encoder.encode(message);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hexHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  return hexHash;
}

async function go() {
   let val1 = document.getElementById('profile').value;

   digestMessage(val1).then(hash => {
      location.href = "profile.html?p=" + hash;
   });
}
 </script>
</body>
</html>
