<html>
 <head>
  <title>Protocol Health</title>
  <link rel='stylesheet' href='styles.css?version=16'></link>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap'>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <style>
   * { box-sizing: border-box; margin: 0; padding: 0; }

   body {
     background: transparent;
     font-family: 'JetBrains Mono', monospace;
     color: #c8d8e8;
     padding: 32px 24px;
   }

   #header { margin-bottom: 28px; }

   #header h2 {
     font-size: 20px;
     font-weight: 700;
     color: #ffffff;
     letter-spacing: -0.01em;
     margin-bottom: 5px;
   }

   #stamp {
     font-size: 10px;
     color: rgba(200,216,232,0.35);
     letter-spacing: 0.07em;
     text-transform: uppercase;
   }

   .diag-section-heading {
     font-size: 10px;
     color: rgba(200,216,232,0.3);
     letter-spacing: 0.1em;
     text-transform: uppercase;
     margin: 20px 0 8px 2px;
   }

   .diag-row {
     padding: 13px 16px;
     background: rgba(255,255,255,0.03);
     border: 1px solid rgba(255,255,255,0.06);
     border-radius: 8px;
     margin-bottom: 7px;
     opacity: 0;
     transform: translateY(8px);
     animation: fadeUp 0.4s ease forwards;
   }

   .diag-row-top {
     display: flex;
     width: 100%;
     align-items: center;
     justify-content: space-between;
     gap: 12px;
   }

   .diag-row-left {
     display: flex;
     align-items: center;
     gap: 8px;
     flex: 1;
     min-width: 0;
   }

   .dot {
     width: 7px;
     height: 7px;
     border-radius: 50%;
     flex-shrink: 0;
   }
   .dot-pass { background: #00e5a0; box-shadow: 0 0 6px #00e5a088; }
   .dot-fail { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b88; }

   .diag-label {
     font-size: 13px;
     color: #c8d8e8;
     letter-spacing: 0.02em;
   }

   .diag-sublabel {
     font-size: 11px;
     color: rgba(200,216,232,0.38);
     margin-left: 4px;
     letter-spacing: 0.04em;
   }

   .diag-counts {
     font-size: 11px;
     color: rgba(200,216,232,0.32);
     white-space: nowrap;
     margin-left: 6px;
   }

   .diag-counts-fail { color: #ff9999; }

   .diag-row-right {
     display: flex;
     align-items: center;
     gap: 14px;
     flex-shrink: 0;
   }

   .diag-status {
     font-size: 10px;
     color: rgba(200,216,232,0.4);
     letter-spacing: 0.05em;
     text-transform: uppercase;
     text-align: right;
     line-height: 1.4;
   }

   .diag-pct {
     font-size: 13px;
     font-weight: 600;
     min-width: 52px;
     text-align: right;
   }
   .pct-high { color: #00e5a0; }
   .pct-mid  { color: #f0c040; }
   .pct-low  { color: #ff6b6b; }

   .diag-total {
     font-size: 13px;
     font-weight: 600;
     color: #00e5a0;
   }

   .diag-bar-wrap {
     width: 100%;
     height: 3px;
     background: rgba(255,255,255,0.07);
     border-radius: 2px;
     margin-top: 9px;
     overflow: hidden;
   }

   .diag-bar-fill {
     height: 100%;
     border-radius: 2px;
     transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
   }

   .diag-failures {
     margin-top: 9px;
     padding: 7px 10px;
     background: rgba(255,107,107,0.07);
     border-left: 2px solid rgba(255,107,107,0.5);
     border-radius: 0 4px 4px 0;
     font-size: 11px;
     color: #ff9999;
     line-height: 1.7;
   }

   .diag-fail-banner {
     display: flex;
     align-items: center;
     gap: 8px;
     padding: 13px 16px;
     background: rgba(255,107,107,0.08);
     border: 1px solid rgba(255,107,107,0.25);
     border-radius: 8px;
     margin-bottom: 7px;
     font-size: 13px;
     color: #ff6b6b;
     font-weight: 600;
     opacity: 0;
     animation: fadeUp 0.4s ease forwards;
   }

   hr.diag-divider {
     border: none;
     border-top: 1px solid rgba(255,255,255,0.05);
     margin: 18px 0;
   }

   #graph-area {
     margin-top: 24px;
     padding: 20px 24px;
     border: 1px solid rgba(255,255,255,0.06);
     border-radius: 8px;
     background: rgba(255,255,255,0.02);
     display: flex;
     align-items: center;
     gap: 32px;
     min-height: 400px;
   }
   #graph-canvas-wrap {
     flex-shrink: 0;
     width: 480px;
     height: 480px;
   }
   #graph-legend {
     flex: 1;
     display: flex;
     flex-direction: column;
     gap: 9px;
   }
   .legend-heading {
     font-size: 10px;
     color: rgba(200,216,232,0.3);
     letter-spacing: 0.1em;
     text-transform: uppercase;
     margin-bottom: 2px;
   }
   .legend-row {
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: 10px;
   }
   .legend-left {
     display: flex;
     align-items: center;
     gap: 8px;
   }
   .legend-dot {
     width: 8px;
     height: 8px;
     border-radius: 50%;
     flex-shrink: 0;
   }
   .legend-label {
     font-size: 12px;
     color: #c8d8e8;
   }
   .legend-value {
     font-size: 12px;
     color: rgba(200,216,232,0.5);
     white-space: nowrap;
   }
   .legend-divider {
     height: 1px;
     background: rgba(255,255,255,0.05);
     margin: 1px 0;
   }

   @keyframes fadeUp {
     to { opacity: 1; transform: translateY(0); }
   }

  #test-chart-wrap {
    margin-bottom: 7px;
  }
  #test-chart-wrap svg {
    overflow: visible;
  }
  .chart-axis line, .chart-axis path {
    stroke: rgba(255,255,255,0.08);
  }
  .chart-axis text {
    fill: rgba(200,216,232,0.45);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }
  .chart-axis-right text {
    fill: rgba(200,216,232,0.35);
  }
  .bar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-anchor: middle;
    pointer-events: none;
  }
  .chart-legend-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 10px;
    margin-left: 48px;
  }
  .chart-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: rgba(200,216,232,0.45);
    letter-spacing: 0.05em;
  }
  .chart-legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  </style>
 </head>
 <body>
  <div id="header">
   <h2>Protocol Health</h2>
   <div id="stamp">Loading...</div>
  </div>
  <div id="graph-area">
    <div id="graph-canvas-wrap"><canvas id="pie-canvas" width="480" height="480" style="width:480px;height:480px"></canvas></div>
    <div id="graph-legend"></div>
  </div>
  <div id="report"></div>

  <script>
   fetch('data/diagnostics.txt')
     .then(r => {
       if (!r.ok) throw new Error('Could not load diagnostics.txt');
       return r.text();
     })
     .then(text => {
       const lines = text.split('\n');
       let stamp = '';

       // entries: { crate, sublabel, status, coverage, passed, failed, failures[], total, totalOf }
       const entries = [];
       let cur = null;

       lines.forEach(line => {

         // === RAT Diagnostics Log (Mon Jun 1 06:37:54 UTC 2026) ===
         if (line.startsWith('=== RAT Diagnostics Log')) {
           const m = line.match(/\((.+?)\)/);
           if (m) stamp = m[1];

         } else if (line.startsWith('--- [')) {
           if (cur) entries.push(cur);

           // format: "--- [crate] sublabel | verdict | COV% coverage | N passed, M failed"
           //      or "--- [crate] verdict | COV% coverage | N passed, M failed"
           //      or "--- [dapps] itr"
           const rest = line.replace(/^---\s*/, '');              // "[book] All tests passed | ..."
           const bm   = rest.match(/^\[(\w+)\]\s*(.*)/);
           if (!bm) return;

           const crate     = bm[1];
           const remainder = bm[2];
           const parts     = remainder.split('|').map(s => s.trim());

           // sublabel = first part if it doesn't contain verdict keywords
           let sublabel  = null;
           let startIdx  = 0;
           if (parts[0] && !parts[0].match(/All tests passed|TESTS FAILED/i) && parts.length > 1) {
             sublabel = parts[0];   // e.g. "test-flow" or "coverage" or "itr"
             startIdx = 1;
           }

           const verdict  = parts[startIdx] || '';
           const status   = verdict.includes('TESTS FAILED') ? 'fail' : 'pass';

           let coverage = null;
           let passed   = null;
           let failed   = null;
           parts.forEach(p => {
             const cm = p.match(/([\d.]+)%\s*coverage/);
             const pm = p.match(/(\d+)\s*passed/);
             const fm = p.match(/(\d+)\s*failed/);
             if (cm) coverage = parseFloat(cm[1]);
             if (pm) passed   = parseInt(pm[1]);
             if (fm) failed   = parseInt(fm[1]);
           });

           // parse line counts if present: "lines: 361/755"
           let linesC = undefined, linesT = undefined;
           parts.forEach(p => {
             const lm = p.match(/lines:\s*(\d+)\/(\d+)/);
             if (lm) { linesC = parseInt(lm[1]); linesT = parseInt(lm[2]); }
           });

           cur = { crate, sublabel, status, coverage, passed, failed, failures: [], total: null, totalOf: null, linesC, linesT };

         } else if (line.match(/total:\s*\d+\/\d+/) && cur) {
           const m = line.match(/total:\s*(\d+)\/(\d+)/);
           if (m) { cur.total = parseInt(m[1]); cur.totalOf = parseInt(m[2]); }

         } else if (line.match(/^\s+\S+::\S+/) && cur) {
           // failure detail: "  module::test_name"
           cur.failures.push(line.trim());

         } else if (line.trim() === '' && cur) {
           entries.push(cur);
           cur = null;
         }
       });
       if (cur) entries.push(cur);

       // ---- Render -----------------------------------------------------------------------------
       const crateEntries = entries.filter(e => e.crate !== 'dapps');
       const dappsEntries = entries.filter(e => e.crate === 'dapps');

       let html  = '';
       let delay = 0;

       const pctClass  = p => p >= 80 ? 'pct-high' : p >= 60 ? 'pct-mid' : 'pct-low';
       const barColor  = p => p >= 80 ? '#00e5a0'  : p >= 60 ? '#f0c040' : '#ff6b6b';

       function renderCrateRow(e) {
         const labelStr    = `[${e.crate}]`;
         // infer sublabel for quizzes if not written by rat: no coverage = test-flow, has coverage = coverage
         const inferredSublabel = e.sublabel
           || (e.crate === 'quizzes' ? (e.coverage !== null ? 'coverage' : 'test-flow') : null);
         const sublabelStr = inferredSublabel
           ? `<span class="diag-sublabel">${inferredSublabel}</span>`
           : '';
         const countsStr = (e.passed !== null)
           ? `<span class="diag-counts">${e.passed} passed${
               e.failed > 0
                 ? `, <span class="diag-counts-fail">${e.failed} failed</span>`
                 : ''
             }</span>`
           : '';

         if (e.status === 'fail') {
           const failuresHtml = e.failures.length
             ? `<div class="diag-failures">${e.failures.join('<br>')}</div>`
             : '';
           return `<div class="diag-fail-banner" style="animation-delay:${delay}ms;flex-direction:column;align-items:flex-start">
             <div style="display:flex;align-items:center;gap:8px">
               <span class="dot dot-fail"></span>
               <span>${labelStr}${sublabelStr} — TESTS FAILED ${countsStr}</span>
             </div>
             ${failuresHtml}
           </div>`;
         }

         const covStr = e.coverage !== null ? e.coverage.toFixed(2) + '%' : null;
         const cls    = e.coverage !== null ? pctClass(e.coverage) : '';
         const color  = e.coverage !== null ? barColor(e.coverage) : '#00e5a0';
         const width  = e.coverage !== null ? e.coverage : 100;

         // test-flow rows (no coverage): show pass count on right, full-width bar
         const rightHtml = covStr
           ? `<span class="diag-status">ALL TESTS<br>PASSED</span>
              <span class="diag-pct ${cls}">${covStr}</span>`
           : (e.passed !== null
               ? `<span class="diag-pct pct-high">${e.passed} passed</span>`
               : `<span class="diag-status">ALL TESTS<br>PASSED</span>`);

         const barHtml = `<div class="diag-bar-wrap">
           <div class="diag-bar-fill" style="width:${width}%;background:${color};box-shadow:0 0 8px ${color}88"></div>
         </div>`;

         const failuresHtml = e.failures.length
           ? `<div class="diag-failures">${e.failures.join('<br>')}</div>`
           : '';

         // only show counts on left for coverage rows (test-flow shows count on right)
         const leftCounts = covStr ? countsStr : '';

         return `<div class="diag-row" style="animation-delay:${delay}ms">
           <div class="diag-row-top">
             <div class="diag-row-left">
               <span class="dot dot-pass"></span>
               <span class="diag-label">${labelStr}${sublabelStr}</span>
               ${leftCounts}
             </div>
             <div class="diag-row-right">${rightHtml}</div>
           </div>
           ${barHtml}
           ${failuresHtml}
         </div>`;
       }

       if (crateEntries.length > 0) {
         html += '<div class="diag-section-heading">Number of Tests</div>';
         html += '<div id="test-chart-wrap"></div>';
       }

       if (crateEntries.length > 0 && dappsEntries.length > 0) {
         html += '<hr class="diag-divider">';
       }

       if (dappsEntries.length > 0) {
         html += '<div class="diag-section-heading">Integration</div>';
         dappsEntries.forEach(e => {
           const pct   = e.totalOf ? (e.total / e.totalOf) * 100 : 100;
           const color = pct >= 100 ? '#00e5a0' : pct >= 80 ? '#f0c040' : '#ff6b6b';
           html += `<div class="diag-row" style="animation-delay:${delay}ms">
             <div class="diag-row-top">
               <div class="diag-row-left">
                 <span class="dot dot-pass"></span>
                 <span class="diag-label">[dapps] itr</span>
               </div>
               <span class="diag-total">${e.total}/${e.totalOf}</span>
             </div>
             <div class="diag-bar-wrap">
               <div class="diag-bar-fill" style="width:${pct}%;background:${color};box-shadow:0 0 8px ${color}88"></div>
             </div>
           </div>`;
           delay += 70;
         });
       }

       document.getElementById('stamp').textContent = stamp ? 'Last run: ' + stamp : '';
       document.getElementById('report').innerHTML  = html;

       // ---- Grouped bar chart (book / libs / quizzes) -----------------------------------------------
       if (crateEntries.length > 0 && document.getElementById('test-chart-wrap')) {
         const chartData = [];

         ['book', 'libs', 'quizzes'].forEach(k => {
           const covEntry    = crateEntries.find(e => e.crate === k && e.coverage !== null);
           const flowEntry   = crateEntries.find(e => e.crate === k && e.coverage === null && e.sublabel !== 'coverage');
           const passedCount = k === 'quizzes'
             ? (flowEntry?.passed ?? covEntry?.passed ?? 0)
             : (covEntry?.passed ?? 0);
           const cov         = covEntry?.coverage ?? null;
           if (passedCount !== null || cov !== null) {
             chartData.push({ crate: k, passed: passedCount, coverage: cov });
           }
         });

         if (chartData.length === 0) return;

         const margin = { top: 24, right: 52, bottom: 32, left: 48 };
         const totalW = document.getElementById('test-chart-wrap').offsetWidth || 600;
         const W      = totalW - margin.left - margin.right;
         const H      = 180;

         const svg = d3.select('#test-chart-wrap')
           .append('svg')
             .attr('width',  totalW)
             .attr('height', H + margin.top + margin.bottom)
           .append('g')
             .attr('transform', `translate(${margin.left},${margin.top})`);

         const crateNames  = chartData.map(d => d.crate);
         const subgroups   = ['passed', 'coverage'];
         const colorPassed = { book: '#ff6b6b', libs: '#00e5a0', quizzes: '#f0c040' };
         const colorCov    = { book: '#ff6b6b66', libs: '#00e5a066', quizzes: '#f0c04066' };

         const x0 = d3.scaleBand().domain(crateNames).range([0, W]).paddingInner(0.28).paddingOuter(0.18);
         const x1 = d3.scaleBand().domain(subgroups).range([0, x0.bandwidth()]).padding(0.08);

         const maxPassed   = d3.max(chartData, d => d.passed) || 1;
         const yLeft  = d3.scaleLinear().domain([0, maxPassed * 1.15]).range([H, 0]);
         const yRight = d3.scaleLinear().domain([0, 100]).range([H, 0]);

         // axes
         svg.append('g').attr('class', 'chart-axis')
           .attr('transform', `translate(0,${H})`)
           .call(d3.axisBottom(x0).tickSize(0))
           .select('.domain').remove();

         svg.selectAll('.chart-axis text').style('fill', 'rgba(200,216,232,0.55)').style('font-size', '11px');

         svg.append('g').attr('class', 'chart-axis')
           .call(d3.axisLeft(yLeft).ticks(4).tickSize(-W))
           .call(g => g.select('.domain').remove())
           .call(g => g.selectAll('.tick line').attr('stroke', 'rgba(255,255,255,0.05)'));

         svg.append('g').attr('class', 'chart-axis chart-axis-right')
           .attr('transform', `translate(${W},0)`)
           .call(d3.axisRight(yRight).ticks(4).tickFormat(d => d + '%').tickSize(0))
           .call(g => g.select('.domain').remove());

         // bars
         const groups = svg.selectAll('.bar-group')
           .data(chartData)
           .join('g')
             .attr('class', 'bar-group')
             .attr('transform', d => `translate(${x0(d.crate)},0)`);

         // passed bars (solid)
         groups.append('rect')
           .attr('x',      x1('passed'))
           .attr('y',      d => yLeft(d.passed))
           .attr('width',  x1.bandwidth())
           .attr('height', d => H - yLeft(d.passed))
           .attr('fill',   d => colorPassed[d.crate])
           .attr('rx', 2);

         // value labels on passed bars
         groups.append('text')
           .attr('class', 'bar-label')
           .attr('x', d => x1('passed') + x1.bandwidth() / 2)
           .attr('y', d => yLeft(d.passed) - 5)
           .attr('fill', d => colorPassed[d.crate])
           .text(d => d.passed);

         // coverage bars (translucent, right Y)
         groups.filter(d => d.coverage !== null)
           .append('rect')
             .attr('x',      x1('coverage'))
             .attr('y',      d => yRight(d.coverage))
             .attr('width',  x1.bandwidth())
             .attr('height', d => H - yRight(d.coverage))
             .attr('fill',   d => colorCov[d.crate])
             .attr('stroke', d => colorPassed[d.crate])
             .attr('stroke-width', 1)
             .attr('rx', 2);

         // value labels on coverage bars
         groups.filter(d => d.coverage !== null)
           .append('text')
             .attr('class', 'bar-label')
             .attr('x', d => x1('coverage') + x1.bandwidth() / 2)
             .attr('y', d => yRight(d.coverage) - 5)
             .attr('fill', d => colorPassed[d.crate])
             .text(d => d.coverage.toFixed(1) + '%');

         // legend
         d3.select('#test-chart-wrap').append('div')
           .attr('class', 'chart-legend-row')
           .html(`
             <div class="chart-legend-item">
               <div class="chart-legend-swatch" style="background:#c8d8e888"></div>
               TESTS PASSED (left axis)
             </div>
             <div class="chart-legend-item">
               <div class="chart-legend-swatch" style="background:#c8d8e833;border:1px solid #c8d8e855"></div>
               COVERAGE % (right axis)
             </div>
           `);
       }

       // ---- Pie chart ----------------------------------------------------------------------
       // collect line counts from entries: "lines: N/T" field
       const chartCrates = ['book', 'libs', 'quizzes'];
       const crateColors = { book: '#ff6b6b', libs: '#00e5a0', quizzes: '#f0c040' };

       // pull covered/total lines from entries that have them
       const lineData = {};
       entries.forEach(e => {
         if (chartCrates.includes(e.crate) && e.linesC !== undefined) {
           if (!lineData[e.crate]) lineData[e.crate] = { c: 0, t: 0 };
           lineData[e.crate].c = e.linesC;
           lineData[e.crate].t = e.linesT;
         }
         // fallback to coverage % if no line counts
         if (chartCrates.includes(e.crate) && !lineData[e.crate] && e.coverage !== null) {
           lineData[e.crate] = { c: e.coverage, t: 100, pctOnly: true };
         }
       });

       const totalCovered   = chartCrates.reduce((s, k) => s + (lineData[k]?.c || 0), 0);
       const totalLines     = chartCrates.reduce((s, k) => s + (lineData[k]?.t || 0), 0);
       const totalUncovered = totalLines - totalCovered;

       // build slices: sub-slices for covered (per crate), one slice for uncovered
       const slices = [];
       chartCrates.forEach(k => {
         const d = lineData[k];
         if (d && d.c > 0) slices.push({ label: k, value: d.c, color: crateColors[k] });
       });
       slices.push({ label: 'uncovered', value: totalUncovered, color: '#ff6b6b33', strokeColor: '#ff6b6b' });

       // draw on canvas
       const canvas = document.getElementById('pie-canvas');
       if (canvas && totalLines > 0) {
         const ctx    = canvas.getContext('2d');
         const cx     = 240, cy = 240, r = 200, inner = 95;
         let angle    = -Math.PI / 2;

         slices.forEach(s => {
           const sweep = (s.value / totalLines) * 2 * Math.PI;
           ctx.beginPath();
           ctx.moveTo(cx, cy);
           ctx.arc(cx, cy, r, angle, angle + sweep);
           ctx.closePath();
           ctx.fillStyle   = s.color;
           ctx.fill();
           if (s.strokeColor) {
             ctx.strokeStyle = s.strokeColor;
             ctx.lineWidth   = 1.5;
             ctx.stroke();
           }

           // percentage label on slice
           const midAngle = angle + sweep / 2;
           const lx = cx + (r * 0.68) * Math.cos(midAngle);
           const ly = cy + (r * 0.68) * Math.sin(midAngle);
           const pct = ((s.value / totalLines) * 100).toFixed(1);
           if (sweep > 0.18) {
             ctx.fillStyle   = s.label === 'uncovered' ? '#ff6b6b' : 'rgba(255,255,255,0.85)';
             ctx.font        = 'bold 13px JetBrains Mono, monospace';
             ctx.textAlign   = 'center';
             ctx.textBaseline = 'middle';
             ctx.fillText(pct + '%', lx, ly);
           }
           angle += sweep;
         });

         // donut hole
         ctx.globalCompositeOperation = 'destination-out';
         ctx.beginPath();
         ctx.arc(cx, cy, inner, 0, 2 * Math.PI);
         ctx.fillStyle = 'rgba(0,0,0,1)';
         ctx.fill();
         ctx.globalCompositeOperation = 'source-over';

         // center label
         const overallPct = totalLines > 0 ? ((totalCovered / totalLines) * 100).toFixed(1) : '—';
         ctx.fillStyle    = '#00e5a0';
         ctx.font         = 'bold 22px JetBrains Mono, monospace';
         ctx.textAlign    = 'center';
         ctx.textBaseline = 'middle';
         ctx.fillText(overallPct + '%', cx, cy - 10);
         ctx.fillStyle = 'rgba(200,216,232,0.35)';
         ctx.font      = '11px JetBrains Mono, monospace';
         ctx.fillText('covered', cx, cy + 14);
       }

       // ---- Legend ----
       const dappsEntry = entries.find(e => e.crate === 'dapps');
       let legendHtml = '<div class="legend-heading">Line Coverage</div>';
       chartCrates.forEach(k => {
         const d = lineData[k];
         if (!d) return;
         const valStr = d.pctOnly
           ? d.c.toFixed(2) + '%'
           : `${d.c.toLocaleString()} / ${d.t.toLocaleString()}`;
         legendHtml += `<div class="legend-row">
           <div class="legend-left">
             <span class="legend-dot" style="background:${crateColors[k]};box-shadow:0 0 5px ${crateColors[k]}88"></span>
             <span class="legend-label">[${k}]</span>
           </div>
           <span class="legend-value">${valStr}</span>
         </div>`;
       });
       if (dappsEntry && dappsEntry.total !== null) {
         legendHtml += '<div class="legend-divider"></div>';
         const allPass = dappsEntry.total === dappsEntry.totalOf;
         legendHtml += `<div class="legend-row">
           <div class="legend-left">
             <span class="legend-dot" style="background:#00e5a0;box-shadow:0 0 5px #00e5a088"></span>
             <span class="legend-label">[dapps] itr</span>
           </div>
           <span class="legend-value" style="color:${allPass ? '#00e5a0' : '#ff6b6b'}">${dappsEntry.total}/${dappsEntry.totalOf} passed</span>
         </div>`;
       }
       document.getElementById('graph-legend').innerHTML = legendHtml;
     })
     .catch(err => {
       document.getElementById('stamp').textContent = '';
       document.getElementById('report').innerHTML  =
         `<div class="diag-fail-banner">Could not load diagnostics: ${err.message}</div>`;
     });
  </script>
 </body>
</html>
