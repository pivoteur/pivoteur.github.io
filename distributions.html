<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol - Cumulative Distributions</title>
    <link rel="stylesheet" href="protocol.css?version=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="page-head">
      <h1>Distributions</h1>
    </div>

    <div class="panel">
      <div class="panel-head" style="display:flex; align-items:center; justify-content:space-between;">
        <span>Cumulative Distributions</span>
        <div style="display:flex; gap:4px;">
          <button class="range-btn" data-days="30">1M</button>
          <button class="range-btn" data-days="90">3M</button>
          <button class="range-btn active" data-days="0">MAX</button>
        </div>
      </div>
      <div style="padding:20px;">
        <div id="summary" class="sub" style="text-align:center; margin-bottom:16px; font-size:13px;">Loading…</div>
        <div id="error" class="neg" style="text-align:center; padding:20px; display:none;">Failed to load distributions data.</div>
        <div id="chartContainer" style="position:relative; width:100%; height:420px;">
          <canvas id="distChart"></canvas>
        </div>
      </div>
    </div>
  </main>

    <script>
    // ----- Token config: label, TSV column prefix, bar color --------------------
    const TOKENS = [
        { label: 'BTC $',    col: 'BTC $ total',    color: '#DE9E1F' },
        { label: 'ETH $',    col: 'ETH $ total',    color: '#8B7FE8' },
        { label: 'AVAX $',   col: 'AVAX $ total',   color: '#FF6B6B' },
        { label: 'stable $', col: 'stable $ total', color: '#4FD9BE' },
        { label: 'UNDEAD $', col: 'UNDEAD $ total', color: '#8B1E1E' },
    ];
    // ----- Parse TSV ------------------------------------------------------------
    function parseTSV(raw) {
        const lines = raw.trim().split('\n');
        const headers = lines[0].split('\t').map(h => h.trim());
        return lines.slice(1).map(line => {
            const vals = line.split('\t');
            const row = {};
            headers.forEach((h, i) => { row[h] = (vals[i] || '').trim(); });
            return row;
        });
    }
    // Strip "$" and "," then parse float; returns NaN if unparseable -------------
    function money(str, context) {
        if (!str) throw new Error(`Missing value${context ? ' for ' + context : ''}`);
        const cleaned = str.replace(/[$,]/g, '');
        const n = parseFloat(cleaned);
        if (isNaN(n)) throw new Error(`Unparseable money value${context ? ' for ' + context : ''}: "${str}"`);
        return n;
    }

    // ----- Filter by real elapsed days back from the latest date in the data.
    // "1M"/"3M" mean exactly 30/90 days, computed via millisecond diff — not
    // setMonth(), which can land 28–31 days back depending on the month. No
    // row-count slicing/assumption — days=0 (MAX) returns every row unfiltered.
    const MS_PER_DAY = 1000 * 60 * 60 * 24;
    function filterByDays(rows, days) {
        if (!days) return rows;
        const latest = new Date(rows[rows.length - 1]['date']);
        return rows.filter(r => (latest - new Date(r['date'])) / MS_PER_DAY <= days);
    }

    // ----- Build & render chart -------------------------------------------------
    function renderChart(rows) {
        const labels = rows.map(r => r['date']);
        const existing = Chart.getChart('distChart');
        if (existing) existing.destroy();
        const datasets = TOKENS.map(tok => ({
            label: tok.label,
            data: rows.map(r => money(r[tok.col], `${tok.col} on ${r['date']}`)),
            backgroundColor: tok.color,
            borderColor:     tok.color,
            borderWidth: 0,
            stack: 'dist',
        }));
        // ----- Summary line ----------------------------------------------------
        const lastRow = rows[rows.length - 1];
        const total = TOKENS.reduce((s, t) => s + money(lastRow[t.col], `${t.col} on ${lastRow['date']}`), 0);
        document.getElementById('summary').textContent =
            `Latest date: ${lastRow['date']}  |  Total cumulative value: $${total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

        const ctx = document.getElementById('distChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            boxWidth: 16, boxHeight: 16, usePointStyle: true, pointStyle: 'rect',
                            padding: 16,
                            color: 'rgba(184,196,212,0.85)',
                            font: { family: "Inter, -apple-system, system-ui, sans-serif", size: 13, weight: '600' },
                        },
                    },
                    tooltip: {
                        mode: 'index',
                        callbacks: {
                            label: ctx => {
                                const v = ctx.parsed.y;
                                return ` ${ctx.dataset.label}: $${v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                            },
                        },
                    },
                },
                scales: {
                    x: {
                        stacked: true,
                        grid: { color: 'rgba(255,255,255,0.07)' },
                        ticks: {
                            maxRotation: 90,
                            minRotation: 45,
                            color: 'rgba(184,196,212,0.5)',
                            font: { size: 10 },
                        },
                    },
                    y: {
                        stacked: true,
                        grid: { color: 'rgba(255,255,255,0.07)' },
                        ticks: {
                            callback: v => '$' + v.toLocaleString(),
                            color: 'rgba(184,196,212,0.5)',
                            font: { size: 12 },
                        },
                        title: {
                            display: true,
                            text: 'Distributed Value ($)',
                            color: 'rgba(200,216,232,0.42)',
                            font: { size: 14 },
                        },
                    },
                },
            },
        });
    }
    // ----- Load TSV then render chart -------------------------------------------------
    let allRows = [];
    let currentDays = 0; // 0 = MAX, matches the "MAX" button marked active by default

    fetch('data/distributions.tsv')
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(raw => {
            allRows = parseTSV(raw);
            renderChart(filterByDays(allRows, currentDays));
        })
        .catch(err => {
            console.error(err);
            document.getElementById('summary').style.display = 'none';
            const el = document.getElementById('error');
            el.textContent = `Error: ${err.message}`;
            el.style.display = 'block';
        });
    // ----- Range selector ---------------------------------------------------------------
    document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (!allRows.length) return; // data hasn't loaded yet
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDays = parseInt(btn.dataset.days, 10);
            renderChart(filterByDays(allRows, currentDays));
        });
    });
    </script>
    <script src="libs/pool-assets.js"></script>
    <script src="libs/chrome.js"></script>
</body>
</html>
