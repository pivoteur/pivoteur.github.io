<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol - Cumulative Distributions</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: "transparent";
            margin: 0;
            padding: 16px;
        }
        h2 {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #ffffff;
        }
        #summary {
            text-align: center;
            font-size: 0.85rem;
            color: #aeaeae;
            margin-bottom: 16px;
        }
        #chartContainer {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        #distChart {
            width: 100% !important;
        }
        #error {
            color: red;
            text-align: center;
            padding: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <h2>Cumulative Distributions</h2>
    <div id="summary">Loading…</div>
    <div id="error">Failed to load distributions data.</div>
    <div id="chartContainer">
        <canvas id="distChart"></canvas>
    </div>
    <script>
    // ----- Token config: label, TSV column prefix, bar color --------------------
    const TOKENS = [
        { label: 'BTC $ total',    col: 'BTC $ total',    color: '#DE9E1F' },
        { label: 'ETH $ total',    col: 'ETH $ total',    color: '#1F5FDE' },
        { label: 'AVAX $ total',   col: 'AVAX $ total',   color: '#EB1E1E' },
        { label: 'stable $ total', col: 'stable $ total', color: '#0B9999' },
        { label: 'UNDEAD $ total', col: 'UNDEAD $ total', color: '#990B0B' },
    ];
    // ----- Parse TSV ------------------------------------------------------------
    function parseTSV(raw) {
        const lines = raw.trim().split('\n');
        const headers = lines[0].split('\t').map(h => h.trim());
        return lines.slice(1).map(line => {
            const vals = line.split('\t');
            const row = {};
            headers.forEach((h, i) => { row[h] = (vals[i] || '').trim(); });
            return row;
        });
    }
    // Strip "$" and "," then parse float; returns NaN if unparseable -------------
    function money(str, context) {
        if (!str) throw new Error(`Missing value${context ? ' for ' + context : ''}`);
        const cleaned = str.replace(/[$,]/g, '');
        const n = parseFloat(cleaned);
        if (isNaN(n)) throw new Error(`Unparseable money value${context ? ' for ' + context : ''}: "${str}"`);
        return n;
    }
    // ----- Build & render chart -------------------------------------------------
    function renderChart(rows) {
        const labels = rows.map(r => r['date']);
        const datasets = TOKENS.map(tok => ({
            label: tok.label,
            data: rows.map(r => money(r[tok.col], `${tok.col} on ${r['date']}`)),
            backgroundColor: tok.color,
            borderColor:     tok.color,
            borderWidth: 0,
            stack: 'dist',
        }));
        // ----- Summary line ----------------------------------------------------
        const lastRow = rows[rows.length - 1];
        const total = TOKENS.reduce((s, t) => s + money(lastRow[t.col], `${t.col} on ${lastRow['date']}`), 0);
        document.getElementById('summary').textContent =
            `Latest date: ${lastRow['date']}  |  Total cumulative value: $${total.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

        const ctx = document.getElementById('distChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { boxWidth: 14, font: { size: 11 } },
                    },
                    tooltip: {
                        mode: 'index',
                        callbacks: {
                            label: ctx => {
                                const v = ctx.parsed.y;
                                return ` ${ctx.dataset.label}: $${v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                            },
                        },
                    },
                },
                scales: {
                    x: {
                        stacked: true,
                        ticks: {
                            maxRotation: 90,
                            minRotation: 45,
                            font: { size: 9 },
                        },
                    },
                    y: {
                        stacked: true,
                        ticks: {
                            callback: v => '$' + v.toLocaleString(),
                            font: { size: 10 },
                        },
                        title: {
                            display: true,
                            text: 'Distributed Value ($)',
                            font: { size: 11 },
                        },
                    },
                },
            },
        });
    }
    // ----- Load TSV then render chart -------------------------------------------------
    fetch('data/distributions.tsv')
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(raw => {
            const rows = parseTSV(raw);
            renderChart(rows);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('summary').style.display = 'none';
            const el = document.getElementById('error');
            el.textContent = `Error: ${err.message}`;
            el.style.display = 'block';
        });
    </script>
</body>
</html>
