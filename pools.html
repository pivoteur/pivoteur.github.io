<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol Pools</title>
    <link rel="stylesheet" href="protocol.css?version=7">
    <script src='https://d3js.org/d3.v4.min.js'></script>
</head>

<body>
  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="pools-layout">
      <div class="pools-left">
        <div class="panel">
          <div class="panel-head" style="display:flex; align-items:center; justify-content:space-between;">
            <span>Pool Overview</span>
            <span class="sub">Pivot Pools TVL&nbsp; <span class="num tvl" style="color:var(--text-bright);">$0.00</span></span>
          </div>
          <div id='vennChart'></div>
        </div>

        <p style="margin:0;">
          <a href='#'
             onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#1-the-pivot-pools";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about the Pivot pools.<br/>
          <a href='#'
             onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/articles/staking.md";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about amplified staking.
        </p>
      </div>

      <div class="panel">
        <div class="panel-head">Pool Name</div>
        <table id="poolTable" border="0" width="100%">
         <tr>
          <th>Pool Name</th><th>incept</th><th>TVL</th><th>ROI</th><th>APR</th>
         </tr>

         <!-- data for pools inserted here via javascript -->

         <tr class="divider-row"><td colspan='5'><hr/></td></tr>
         <tr><th colspan='5'>Non-pool stakes</th></tr>

         <!-- data for treasure and echo pool inserted here -->

        </table>
      </div>
    </div>
  </main>

    <script src="libs/table.js"></script>
    <script src='libs/usd.js'></script>
    <script src='libs/tokens.js'></script>
    <script src='https://benfred.github.io/venn.js/venn.js'></script>
    <script src='libs/charts/venn.js'></script>
    <script src='libs/dom.js'></script>
    <script src="libs/pool-assets.js"></script>
    <script src="libs/pool-health.js"></script>
    <script src='libs/chrome.js'></script>
    <script>
       indexPools('wallets', '', 1).then(() => {
          // pool-health.js may not have loaded correctly, or a given run may
          // simply have no data yet — bail quietly rather than error.
          if (typeof poolHealth === 'undefined' || !poolHealth.pools) return;

          const healthByPool = {};
          poolHealth.pools.forEach(p => { healthByPool[p.pool] = parseUSD(p.available); });

          // Uncommitted amounts are often tiny relative to total pool TVL —
          // floor the segment width so it stays a visible sliver instead of
          // disappearing at sub-pixel width, same pattern as the Dashboard's
          // token/TVL breakdown bars.
          const UNCOMMITTED_MIN_PCT = 4;

          document.querySelectorAll('#poolTable tr').forEach(tr => {
             const nameCell = tr.cells && tr.cells[0];
             if (!nameCell) return;
             const poolName = nameCell.textContent.trim();
             if (!(poolName in healthByPool)) return; // no health data for this row — leave plain TVL text as-is

             const tvlCell = tr.cells[2];
             if (!tvlCell) return;

             const totalTvl = parseUSD(tvlCell.textContent);
             const uncommitted = healthByPool[poolName];
             if (!totalTvl || totalTvl <= 0) return; // guard against div-by-zero / negative-TVL rows

             const rawPct = (uncommitted / totalTvl) * 100;
             const uncommittedPct = Math.min(100, Math.max(rawPct, UNCOMMITTED_MIN_PCT));
             const activePct = 100 - uncommittedPct;
             const active = totalTvl - uncommitted;

             tvlCell.innerHTML = `
                <div class="num">${showUsd(totalTvl)}</div>
                <div class="segbar pool-tvl-bar" title="Active: ${showUsd(active)} · Uncommitted: ${showUsd(uncommitted)}">
                   <div class="seg" style="width:${activePct.toFixed(2)}%;background:var(--teal);"></div>
                   <div class="seg" style="width:${uncommittedPct.toFixed(2)}%;background:var(--gold);"></div>
                </div>`;
          });
       });
    </script>
    
</body>
</html>
