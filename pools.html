<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol Pools</title>
    <link rel="stylesheet" href="styles.css"></link>
    <style>
     div { background: rgba(15,15,15,0.7); }
    </style>
    <script src='https://d3js.org/d3.v4.min.js'></script>
</head>

<body>
   <center><h1>Pivot Pool Management</h1></center>
   <h2>Pivot Pools TVL <span class='tvl'>$0.00</span></h2>

  <style>
   .venntooltip {
      position: absolute;
      text-align: center;
      width: 400px;
      heigth: 200px;
      background: #333;
      color: #ddd;
      padding: 2px;
      border: 0px;
      border-radius: 8px;
      opacity: 0;
   }
  </style>
  <table border="1" width="100%" id="poolTable">
   <tr><td colspan='5'><div id='vennChart'></div></td></tr>
   <tr><td colspan='5'><hr/></td></tr>
   <tr>
    <th>Pool Name</th><th>incept</th><th>TVL</th><th>ROI</th><th>APR</th>
   </tr>

   <!-- data for pools inserted here via javascript -->

   <tr><td colspan='5'><hr/></td></tr>
   <tr><th colspan='5'>Non-pool stakes</th></tr>

   <!-- data for treasure and echo pool inserted here -->

   <tr><th>quotes:</th>
       <td>BTC</td><td id='btc'>btc</td>
       <td>ETH</td><td id='eth'>eth</td>
   </tr>
  </table>

  <p style="vertical-align:bottom">
   <a href='#'
      onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#1-the-pivot-pools";'>
Learn more <img src='imgs/leave-site.png' width='16'/></a> 
about the Pivot pools.<br/>
   <a href='#'
      onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/articles/staking.md";'>
Learn more <img src='imgs/leave-site.png' width='16'/></a>
about amplified staking.
  </p>

<div id="crypto-table-container"></div>

<script type="module">
  // 1. Import both JSON files using the working syntax
  import quoteData from "./libs/quotes.json" with { type: 'json' };
  import poolData from "./libs/pool-assets.json" with { type: 'json' };

  // 2. Extract the data structures
  const quotes = quoteData.quotes;
  const pools = poolData.assets;

  // 3. Flatten the pool pairs into a unique Set of allowed tokens
  // This turns [["BTC", "ETH"], ["BTC", "AVAX"]] into a clean list: {'BTC', 'ETH', 'AVAX'}
  const allowedTokens = new Set(pools.flat());

  // 4. Start building the table HTML string
  let tableHTML = `
    <table border="1" style="border-collapse: collapse; width: 100%; text-align: left;">
      <thead>
        <tr style="background-color: #f2f2f2;">
          <th style="padding: 8px;">Asset</th>
          <th style="padding: 8px;">Price (USD)</th>
        </tr>
      </thead>
      <tbody>
  `;

  // 5. Loop through quotes and only include tokens present in our Set
  for (const [asset, price] of Object.entries(quotes)) {
    if (allowedTokens.has(asset)) {
      tableHTML += `
        <tr>
          <td style="padding: 8px; font-weight: bold;">${asset}</td>
          <td style="padding: 8px;">$${price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 8 })}</td>
        </tr>
      `;
    }
  }

  tableHTML += `
      </tbody>
    </table>
  `;

  // 6. Inject the filtered table into your HTML container
  document.getElementById('crypto-table-container').innerHTML = tableHTML;
</script>
    <script src="libs/table.js"></script>
    <script src='libs/usd.js'></script>
    <script src='libs/tokens.js'></script>
    <script src='https://benfred.github.io/venn.js/venn.js'></script>
    <script src='libs/charts/venn.js'></script>
    <script src='libs/dom.js'></script>
    <script>
     indexPools();
    </script>

</body>
</html>
