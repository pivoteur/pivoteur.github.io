<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol Pools</title>
    <link rel="stylesheet" href="protocol.css?version=4">
    <script src='https://d3js.org/d3.v4.min.js'></script>
</head>

<body>
  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main class="pools-main">
    <div class="page-head">
      <h1>Pools</h1>
      <div class="sub">Pivot Pools TVL&nbsp; <span class="num tvl" style="color:var(--text-bright);font-size:15px;">$0.00</span></div>
    </div>

    <div class="pools-layout">
      <div class="panel">
        <div class="panel-head">Pool Overview</div>
        <div id='vennChart'></div>
      </div>

      <div class="panel">
        <div class="panel-head">Pool Name</div>
        <table id="poolTable" border="0" width="100%">
         <tr>
          <th>Pool Name</th><th>incept</th><th>TVL</th><th>ROI</th><th>APR</th>
         </tr>

         <!-- data for pools inserted here via javascript -->

         <tr class="divider-row"><td colspan='5'><hr/></td></tr>
         <tr><th colspan='5'>Non-pool stakes</th></tr>

         <!-- data for treasure and echo pool inserted here -->

        </table>
      </div>
    </div>

    <p style="margin-top:8px;">
      <a href='#'
         onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#1-the-pivot-pools";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about the Pivot pools.<br/>
      <a href='#'
         onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/articles/staking.md";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about amplified staking.
    </p>
  </main>

    <script src="libs/table.js"></script>
    <script src='libs/usd.js'></script>
    <script src='libs/tokens.js'></script>
    <script src='https://benfred.github.io/venn.js/venn.js'></script>
    <script src='libs/charts/venn.js'></script>
    <script src='libs/dom.js'></script>
    <script src="libs/pool-assets.js"></script>
    <script src='libs/chrome.js'></script>
    <script>indexPools('wallets', '', 1);</script>
    
</body>
</html>
