<!DOCTYPE html>

<head>

    <title>Pivot Protocol <span class='title'>Echo</span> Pool Details</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="protocol.css?version=1">
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="page-head">
      <h1><span class="title">Echo</span> Pool Details</h1>
      <div class="sub">TVL&nbsp; <span class="num tvl" style="color:var(--text-bright);font-size:15px;">$0.00</span></div>
    </div>

    <div class="panel">
      <div class="panel-head">Stake Address</div>
      <div style="padding:16px 20px; display:flex; align-items:center; gap:10px;">
        [STAKE] $UNDEAD into <span class="title">Echo</span> pool —
        <span id="z" class="addy num" style="color:var(--text-bright);">0x0BA882a9E2695fCcAD7F52803CB6AE685a71AE44</span>
        <input type="image" id="clipboard" onClick="copyAddy1()" src="imgs/clipboard.png" height="20" width="20" style="cursor:pointer;">
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><span class="pair">ETH+UNDEAD</span> γ-Apportionment</div>
      <div style="padding:20px; max-width:700px; margin:0 auto;">
        <canvas id="barChart" width="800" height="400"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">Pivot Arbitrage Efficacy</div>
      <div style="padding:20px; max-width:700px; margin:0 auto;">
        <canvas id="lineChart" width="800" height="400"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">Related</div>
      <div style="padding:16px 20px;">
        See <a href="diy.html?t1=ETH&t2=UNDEAD" id="screens"><span class="title">Echo</span> Pool screens</a>
      </div>
    </div>

    <p style="margin-top:8px;">
      <a href='#'
         onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#4-asset-apportionment--measuring-performance-of-pivot-arbitrage";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about γ-apportionment in pivot pools.
    </p>
  </main>

    <script src="libs/indicators.js"></script>
