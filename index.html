<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol</title>
    <link rel="stylesheet" href="protocol.css?version=1">
    <script> const version = 22; 
      // When the versoin number updates for `protocol.css`, update the version number here, too. 
    </script> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="page-head">
      <h1>Dashboard</h1>
      <div class="header-dapps-bar" id="headerDappsBar">
        <div class="section-label" style="text-align:center; margin-bottom:4px;">TVL</div>
        <div class="segbar" id="dappsSegbar"></div>
        <div class="segbar-caption sub" id="dappsSegCaption">Loading…</div>
      </div>
      <div class="sub">Protocol NAV&nbsp; <span class="num tvl" style="color:var(--text-bright);font-size:15px;">$0.00</span></div>
    </div>

    <div class="panel">
      <div class="panel-head">Tokens <span id="tokensTotal" class="sub"></span></div>
      <div style="padding:20px 20px 8px;">
        <div class="section-label">Token Breakdown</div>
        <div class="segbar" id="tokensSegbar"></div>
        <div class="segbar-caption sub" id="tokensSegCaption">Loading…</div>
      </div>

      <div class="panel-divider"></div>

      <div class="panel-head" style="border-bottom:none;">NAV</div>
      <div style="padding:0 20px 20px; max-width:700px; margin:0 auto;">
        <canvas id="barChart" width="400" height="200"></canvas>
      </div>
      <div id="navSummary" class="sub" style="padding:0 20px 18px; font-size:12px;">Loading…</div>
    </div>

    <section class="panel">
      <div class="panel-head">Pools</div>
      <table>
        <thead><tr><th>Pool</th><th>Incept</th><th>TVL</th><th>ROI</th><th>APR</th><th></th></tr></thead>
        <tbody id="poolTableBody">
          <tr><td colspan="6" class="sub" style="padding:20px;">Loading pools…</td></tr>
        </tbody>
      </table>
    </section>

    <p style="margin-top:8px;">
      <a href="#" onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md";'>
        Learn more <img src="imgs/leave-site-2.png" width="16"/></a>
      about the Pivot Protocol.
    </p>
    <p class="sub" style="text-align:center; margin-top:4px;">pre-α, version <span class="version">version</span></p>
  </main>

    <script src="libs/copy-addy.js"></script>
    <script src="libs/table.js"></script>
    <script src="libs/canvas-bg.js"></script>
    <script src="libs/colors.js"></script>
    <script src="libs/usd.js"></script>
    <script src="libs/tokens.js"></script>
    <script src="libs/charts/bar.js"></script>
    <script src="libs/charts/pie.js"></script>
    <script src="libs/indicators.js"></script>
    <script src="libs/dom.js"></script>
    <script src="libs/pool-assets.js"></script>
    <script src="libs/chrome.js"></script>
    <script>
       fetch('data/assets.csv')
            .then(result => result.text())
            .then(data => {
   tvlChart(data);

   try {
      // Always-visible NAV summary + stat cards — no hover required.
      // Reuses the same helpers bar.js already calls (sortedTable, orderedIndices, parseUSD).
      let [assets, idx] = sortedTable(data, ',');
      let labels = orderedIndices(idx).slice(1); // skip 'date'

      // Guard against blank/malformed trailing rows (assets.csv has a few).
      const validRows = assets.filter(r => r && r[idx['date']] && r[idx['date']].trim() !== '');

      const rowTotal = r => labels.reduce((sum, [name, i]) => sum + parseUSD(r[i]), 0);
      const latest = validRows[validRows.length - 1];

      document.getElementById('navSummary').textContent =
         'Latest date: ' + latest[idx['date']] + '  |  Total: ' + usd(latestTotal);

   } catch (err) {
      console.error('NAV summary failed:', err);
      document.getElementById('navSummary').textContent = 'Could not compute NAV summary: ' + err.message;
      document.getElementById('navSummary').classList.add('neg');
   }
});
       fetch('data/wallets.tsv')
            .then(result => result.text())
            .then(data => {
   let [wallets, idx] = table(data);

   // --- Token breakdown, rendered as a segmented bar (not a donut). Computed once
   // here and reused for both the header total and the bar, so the two numbers
   // can never disagree the way the old donut-center-total vs. header-total did.
   let tokenAmounts = [];
   let tokenLabels = usdLabels(idx).map(([lab, ix]) => {
      tokenAmounts.push(total(wallets.map(r => r[ix])));
      return lab;
   });
   const tokenEntriesAll = tokenLabels.map((lab, i) => [lab, tokenAmounts[i]]);
   const tokensGrandTotal = tokenEntriesAll.reduce((s, [, v]) => s + v, 0);
   const tokensTotal = showUsd(tokensGrandTotal);
   replaceText('tvl', tokensTotal);
   document.getElementById('tokensTotal').textContent = '· ' + tokensTotal;
   replaceText('version', version);

   // Bar only shows positive-value tokens — a negative-value token would break
   // proportional width the same way dapps' negative treasury figure did.
   const tokenEntries = tokenEntriesAll.filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
   const tokenPosTotal = tokenEntries.reduce((s, [, v]) => s + v, 0);
   const TOKEN_MIN_PCT = 5;
   const tokenRawPcts = tokenEntries.map(([, v]) => tokenPosTotal ? (v / tokenPosTotal) * 100 : 0);
   const tokenFloored = tokenRawPcts.map(p => Math.max(p, TOKEN_MIN_PCT));
   const tokenFlooredTotal = tokenFloored.reduce((a, b) => a + b, 0);
   const tokenDisplayPcts = tokenFloored.map(p => (p / tokenFlooredTotal) * 100);

   const tokensSegbar = document.getElementById('tokensSegbar');
   tokensSegbar.innerHTML = tokenEntries.map(([label, val], i) => {
      return '<div class="seg" style="width:' + tokenDisplayPcts[i].toFixed(2) + '%;background:' + colorOf(label) + '" title="' + label + ': ' + showUsd(val) + '"></div>';
   }).join('');

   document.getElementById('tokensSegCaption').textContent =
      tokenEntries.map(([label, val]) => label + ' ' + (tokenPosTotal ? (val / tokenPosTotal * 100).toFixed(0) : 0) + '%').join(' · ');

   // ----- dapps breakdown --------------------------------------------------------------
   let dappTvl = {};
   row(wallets, idx, 'dapp').forEach((label, ix) => {
      const amt = parseUSD(wallets[ix][idx['TVL']]);
      dappTvl[label] = (dappTvl[label] || 0) + amt;
   });
   const BAR_CATEGORIES = ['pools', 'reserves', 'operations'];
   const dappEntries = BAR_CATEGORIES
      .filter(label => dappTvl[label] !== undefined)
      .map(label => [label, dappTvl[label]])
      .sort((a, b) => b[1] - a[1]);
   const dappTotal = dappEntries.reduce((sum, [, v]) => sum + v, 0);

   // Explicit, guaranteed-distinct colors — colorOf()'s hash-based palette
   // put pools/reserves/operations too close together to tell apart at a glance.
   const CATEGORY_COLOR = { pools: 'var(--teal)', reserves: 'var(--chrome)', operations: 'var(--gold)' };

   // Minimum visual width so a tiny share (e.g. operations at 0.03%) still
   // renders as a real, visible sliver instead of disappearing at sub-pixel width.
   const MIN_PCT = 6;
   const rawPcts = dappEntries.map(([, v]) => dappTotal ? (v / dappTotal) * 100 : 0);
   const floored = rawPcts.map(p => Math.max(p, MIN_PCT));
   const flooredTotal = floored.reduce((a, b) => a + b, 0);
   const displayPcts = floored.map(p => (p / flooredTotal) * 100);

   const segbar = document.getElementById('dappsSegbar');
   segbar.innerHTML = dappEntries.map(([label], i) => {
      const displayPct = displayPcts[i];
      const color = CATEGORY_COLOR[label] || colorOf(label);
      return '<div class="seg" style="width:' + displayPct.toFixed(2) + '%;background:' + color + '" title="' + label + ': ' + showUsd(dappEntries[i][1]) + '"></div>';
   }).join('');

   document.getElementById('dappsSegCaption').textContent =
      dappEntries.map(([label, val]) => label + ' ' + (dappTotal ? (val / dappTotal * 100).toFixed(0) : 0) + '%').join(' · ');

   // Real pool rows, filtered to dapp === 'pools'. Link target comes straight
   // from the TSV's own href column — no invented routing.
   const poolRows = wallets.filter(r => r[idx['dapp']] === 'pools');

   const tbody = document.getElementById('poolTableBody');
   tbody.innerHTML = poolRows.map(r => {
      const name  = r[idx['pool']];
      const p1    = r[idx['p1']];
      const p2    = r[idx['p2']];
      const incept = r[idx['incept']];
      const tvl   = r[idx['TVL']];
      const roi   = r[idx['ROI']];
      const apr   = r[idx['APR']];
      const href  = r[idx['href']] || 'pools.html';
      const roiCls = roi.trim().startsWith('-') ? 'neg' : 'pos';
      const aprCls = apr.trim().startsWith('-') ? 'neg' : 'pos';
      return '<tr class="clickable" onclick="location.href=\'' + href + '\'">' +
         '<td class="name-cell">' + name + ' <span class="sub">(' + p1 + '+' + p2 + ')</span></td>' +
         '<td class="num">' + incept + '</td>' +
         '<td class="num">' + tvl + '</td>' +
         '<td class="num ' + roiCls + '">' + roi + '</td>' +
         '<td class="num ' + aprCls + '">' + apr + '</td>' +
         '<td class="chevron">›</td></tr>';
   }).join('');
});
    </script>
</body>
</html>
