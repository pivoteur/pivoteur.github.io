<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol</title>
    <link rel="stylesheet" href="tokens.css?version=1">
    <link rel="stylesheet" href="chrome.css?version=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="page-head">
      <h1>Dashboard</h1>
      <div class="sub">Protocol NAV&nbsp; <span class="num tvl" style="color:var(--text-bright);font-size:15px;">$0.00</span></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:24px;">
      <div class="panel" style="margin-bottom:0;">
        <div class="panel-head">Tokens</div>
        <div style="padding:16px; max-width:420px; margin:0 auto;">
          <canvas id="tokensChart" width="400" height="200"></canvas>
        </div>
      </div>

      <div class="panel" style="margin-bottom:0;">
        <div class="panel-head">dapps</div>
        <div style="padding:16px; max-width:420px; margin:0 auto;">
          <canvas id="dappsChart" width="400" height="200"></canvas>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">NAV</div>
      <div style="padding:20px; max-width:700px; margin:0 auto;">
        <canvas id="barChart" width="400" height="200"></canvas>
      </div>
    </div>

    <p style="margin-top:8px;">
      <a href="#" onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md";'>
        Learn more <img src="imgs/leave-site.png" width="16"/></a>
      about the Pivot Protocol.
    </p>
  </main>

    <script src="libs/copy-addy.js"></script>
    <script src="libs/table.js"></script>
    <script src="libs/canvas-bg.js"></script>
    <script src="libs/colors.js"></script>
    <script src="libs/usd.js"></script>
    <script src="libs/tokens.js"></script>
    <script src="libs/charts/bar.js"></script>
    <script src="libs/charts/pie.js"></script>
    <script src="libs/indicators.js"></script>
    <script src="libs/dom.js"></script>
    <script src="libs/chrome.js"></script>
    <script>
       fetch('data/assets.csv')
            .then(result => result.text())
            .then(data => tvlChart(data));
       fetch('data/wallets.tsv')
            .then(result => result.text())
            .then(data => {
   let [wallets, idx] = table(data);
   pieChart(wallets, idx, 'dappsChart', 'dapp', true);
   replaceText('tvl', tokenChart(wallets, idx, 'tokensChart'));
});
    </script>
</body>
</html>
