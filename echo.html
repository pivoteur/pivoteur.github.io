<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Protocol Echo Pool</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="tokens.css?version=7">
    <link rel="stylesheet" href="chrome.css?version=2">
</head>
<body>

  <div id="app-ticker"></div>
  <div id="app-nav"></div>

  <main>
    <div class="page-head">
      <h1>Echo Pool</h1>
    </div>

    <div class="panel">
      <div class="panel-head">Stake Address</div>
      <div style="padding:16px 20px; display:flex; align-items:center; gap:10px;">
        [STAKE] $UNDEAD into Echo pool —
        <span class="addy num" style="color:var(--text-bright);">0x0BA882a9E2695fCcAD7F52803CB6AE685a71AE44</span>
        <input type="image" id="clipboard"
               onClick="copyAddy('0x0BA882a9E2695fCcAD7F52803CB6AE685a71AE44')"
               src="imgs/clipboard.png" height="20" width="20" style="cursor:pointer;">
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">Radar</div>
      <div style="padding:20px; max-width:700px; margin:0 auto;">
        <canvas id="radarChart" width="800" height="400"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">Apportionment</div>
      <div style="padding:20px; max-width:700px; margin:0 auto;">
        <canvas id="barChart" width="800" height="400"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">Related</div>
      <div style="padding:16px 20px; display:flex; gap:32px;">
        <div>See <a href="diy.html?t1=ETH&t2=UNDEAD">Echo Pool screens</a></div>
        <div>See <a href='detail.html?title=Echo&p1=ETH&p2=UNDEAD&addy=0x0BA882a9E2695fCcAD7F52803CB6AE685a71AE44&file=echo'>Echo Pool Details</a></div>
      </div>
    </div>

    <p style="margin-top:8px;">
      <a href='#'
         onclick='window.top.location.href = "https://github.com/pivoteur/biz/blob/main/README.md#2-the-echo-pools";'>
Learn more <img src='imgs/leave-site-2.png' width='16'/></a>
about the Echo pool.
    </p>
  </main>

    <script src="libs/indicators.js"></script>
    <script src="libs/table.js"></script>
    <script src="libs/pivots.js"></script>
    <script src="libs/copy-addy.js"></script>
    <script src="libs/canvas-bg.js"></script>
    <script src='libs/usd.js'></script>
    <script src='libs/colors.js'></script>
    <script src='libs/tokens.js'></script>
    <script src="libs/charts/bar.js"></script>
    <script src="libs/charts/radar.js"></script>
    <script src='libs/chrome.js'></script>
    <script>
        fetch('data/wallets.tsv').then(response => response.text())
             .then(data => radarChart(data, 'echo'));
        fetch('data/pools/echo.tsv').then(response => response.text())
             .then(data => barChart(data));
    </script>
</body>
</html>
