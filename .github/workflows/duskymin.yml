name: duskymin

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "32 08 * * *" # in our time zone, this is 04:32 AM Eastern Time

permissions:
  contents: write

jobs:
  run-duskymin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # Only needed to build dusk
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          path: protocol

      - name: Set up rust
        uses: dtolnay/rust-toolchain@stable
          
      - name: Checkout crypto-n-rust # Only needed for dusk's `book` dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Build dusk
        run: |
          cargo build --manifest-path protocol/dapps/dusk/Cargo.toml --bin dusk
          echo "$GITHUB_WORKSPACE/protocol/dapps/dusk/target/debug" >> $GITHUB_PATH
      
      - name: Putting date and URL into the env
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV
      
      - name: run dusk and Log Output
        env:
          PIVOT_GIT_TOKEN: ${{ secrets.PIVOT_GIT_TOKEN }}
        run: |
          dusk --min pivot $LE_DATE > data/pivots/calls.csv

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/calls.csv
          git diff --staged --quiet && echo "Nothing to commit, skipping push" && exit 0
          git commit -m "dusk --min $LE_DATE"
          git push
