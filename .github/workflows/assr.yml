name: assr

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # Only needed to build assets
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          token: ${{ secrets.PIVOTEUR_TOKEN }}
          path: protocol

      - name: Set up rust
        uses: dtolnay/rust-toolchain@stable
          
      - name: Checkout crypto-n-rust # needed for assets' `book` dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          token: ${{ secrets.PIVOT_GIT_TOKEN }}
          path: crypto-n-rust

      - name: Build assets
        run: |
          cargo build --manifest-path protocol/dapps/assets/Cargo.toml --bin assets
          echo "$GITHUB_WORKSPACE/protocol/dapps/assets/target/debug" >> $GITHUB_PATH

      - name: Putting date and URL into the env
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: run assets and Log Output
        run: |
          assets pivot $LE_DATE >> data/assets.tsv

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/assets.tsv
          git diff --staged --quiet && echo "Nothing to commit, skipping push" && exit 0
          git commit -m "assets $LE_DATE"
          git push
