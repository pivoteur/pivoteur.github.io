name: wyrd

on:
  workflow_dispatch:
    inputs:
      ix:
        description: 'ix row from table'
        required: true
        type: string
        default: '1'
      tx_id:
        description: 'Transaction ID'
        required: true
        type: string
        default: 'asdf'
      new_to_actual:
        description: 'New to actual value'
        required: true
        type: string
        default: '8008'

permissions:
  contents: write

jobs:
  run-wyrd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          path: protocol
          
      - name: Checkout crypto-n-rust
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: protocol/dapps

      - name: Show input parameters
        run: |
          echo "=== Running wyrd with manual inputs ==="
          echo "ix: ${{ inputs.ix }}"
          echo "tx_id: ${{ inputs.tx_id }}"
          echo "new_to_actual: ${{ inputs.new_to_actual }}"

      - name: Base variables
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PGI=pivoteur.github.io" >> $GITHUB_ENV
          echo "DAPPS_DIR=protocol/dapps" >> $GITHUB_ENV
          echo "TARGET_DIR=target/release" >> $GITHUB_ENV
          echo "GIT_RAW_URL=https://raw.githubusercontent.com" >> $GITHUB_ENV

      - name: Establish pathing to dapps
        run: |
          echo "PROTOCOL=pivoteur/$PGI" >> $GITHUB_ENV
          echo "GIT_DAPPS_DIR=$GITHUB_WORKSPACE/$DAPPS_DIR" >> $GITHUB_ENV

      - name: protocol URL and paths to dapps
        run: |
          echo "PIVOT_URL=$GIT_RAW_URL/$PROTOCOL" >> $GITHUB_ENV
          echo "$GIT_DAPPS_DIR/wyrd/$TARGET_DIR" >> $GITHUB_PATH
          echo "$GIT_DAPPS_DIR/appender/$TARGET_DIR" >> $GITHUB_PATH

      - name: Build wyrd
        run: |
          cargo build --manifest-path $DAPPS_DIR/wyrd/Cargo.toml \
          --bin wyrd --release

      - name: Build appender
        run: |
          cargo build --manifest-path $DAPPS_DIR/appender/Cargo.toml \
          --bin appender --release

      - name: Find pool tables
        run: find $GITHUB_WORKSPACE -name "btc-eth.tsv"

      - name: Run wyrd and append to close pivot table
        run: |
          wyrd pivot $GITHUB_WORKSPACE/data/pivots/close/raw "${{inputs.ix}}" \
          "${{inputs.tx_id}}" "${{inputs.new_to_actual}}" | appender

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/close/raw/*.tsv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "wyrd $LE_DATE"
          git push

