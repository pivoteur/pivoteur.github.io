name: wyrd

on:
  workflow_dispatch:
    inputs:
      ix:
        description: 'ix row from table'
        required: true
        type: string
        default: '1'
      tx_id:
        description: 'Transaction ID'
        required: true
        type: string
        default: 'asdf'
      new_to_actual:
        description: 'New to actual value'
        required: true
        type: string
        default: '8008'
      dry_run:
        description: 'Dry run (leave checked to print to stdout only, no append, no commit)'
        required: true
        type: boolean
        default: true

env:
  DAPP: wyrd

permissions:
  contents: write

jobs:
  run-wyrd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Load Shared Environment Variables
        uses: doughepi/yaml-env-action@v1.0.0
        with:
          files: .github/config/protocol-env.yml
          
      - name: Establish app path
        run: echo "DAPP_DIR=$DAPPS_DIR/$DAPP" >> $GITHUB_ENV

      - name: Establish git path
        run: echo "GIT_DAPP_DIR=$GITHUB_PATH/$DAPP_DIR" >> $GITHUB_ENV

      - name: Cache wyrd binary
        id: wyrd-cache
        uses: actions/cache@v4
        with:
          path: protocol/dapps/wyrd/target/release/wyrd
          key: >-
            wyrd-binary- 
            ${{ hashFiles(format('{0}/quiz08/b_wyrd/**/*.rs', env.QUIZZES_SRC)) }}- 
            ${{ hashFiles(format('{0}/Cargo.toml', env.DAPP_DIR)) }}-
            ${{ hashFiles(format('{0}/Cargo.lock', env.DAPP_DIR)) }}

      - name: Cache appender binary
        id: appender-cache
        uses: actions/cache@v4
        with:
          path: protocol/dapps/appender/target/release/appender
          key: appender-binary-${{ hashFiles('protocol/quizzes/src/quiz08/c_appender/**/*.rs', 'protocol/dapps/appender/Cargo.toml', 'protocol/dapps/appender/Cargo.lock') }}

      - name: Install Rust toolchain
        if: steps.wyrd-cache.outputs.cache-hit != 'true' || steps.appender-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout crypto-n-rust
        if: steps.wyrd-cache.outputs.cache-hit != 'true' || steps.appender-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Show input parameters
        run: |
          echo "=== Running wyrd with manual inputs ==="
          echo "ix: ${{ inputs.ix }}"
          echo "tx_id: ${{ inputs.tx_id }}"
          echo "new_to_actual: ${{ inputs.new_to_actual }}"
          echo "dry_run: ${{ inputs.dry_run }}"

      - name: Base variables
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PGI=pivoteur.github.io" >> $GITHUB_ENV
          echo "GIT_RAW_URL=https://raw.githubusercontent.com" >> $GITHUB_ENV

      - name: Establish pathing to dapps
        run: |
          echo "PROTOCOL=pivoteur/$PGI" >> $GITHUB_ENV

      - name: protocol URL and paths to dapps
        run: |
          echo "PIVOT_URL=$GIT_RAW_URL/$PROTOCOL" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/protocol/dapps/wyrd/target/release" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/protocol/dapps/appender/target/release" >> $GITHUB_PATH

      - name: Build wyrd
        if: steps.wyrd-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path $DAPP_DIR/Cargo.toml --bin wyrd --release

      - name: Build appender
        if: steps.appender-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path protocol/dapps/appender/Cargo.toml --bin appender --release

      - name: Run wyrd and append to close pivot table
        run: |
          $DAPP $PROTOCOL_ALIAS data/pivots/close/raw "${{inputs.ix}}" \
          "${{inputs.tx_id}}" "${{inputs.new_to_actual}}" > /tmp/wyrd_out.txt

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN: would append the following to data/pivots/close/raw ==="
            cat /tmp/wyrd_out.txt
          else
            cat /tmp/wyrd_out.txt | appender
          fi

      - name: Commit and push results
        if: ${{ inputs.dry_run != true }}
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/close/raw/*.tsv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "wyrd $LE_DATE"
          git push
