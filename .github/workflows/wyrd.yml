name: wyrd

on:
  workflow_dispatch:
    inputs:
      ix:
        description: 'ix row from table'
        required: true
        type: string
        default: '1'
      tx_id:
        description: 'Transaction ID'
        required: true
        type: string
        default: 'asdf'
      new_to_actual:
        description: 'New to actual value'
        required: true
        type: string
        default: '8008'

permissions:
  contents: write

jobs:
  run-wyrd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # needed for `lib` dependencies
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          path: protocol

      - name: Set up rust
        uses: dtolnay/rust-toolchain@stable
      - name: Checkout crypto-n-rust # needed for `book` dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Showing wyrd's vars
        run: |
          echo "=== Running wyrd with manual inputs ==="
          echo "ix: ${{ inputs.ix }}"
          echo "tx_id: ${{ inputs.tx_id }}"
          echo "new_to_actual: ${{ inputs.new_to_actual }}"

      - name: Build wyrd
        run: |
          cargo build --manifest-path protocol/dapps/wyrd/Cargo.toml --bin wyrd
          echo "$GITHUB_WORKSPACE/protocol/dapps/wyrd/target/debug" >> $GITHUB_PATH

      - name: adding the date and pivot_url into the env
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: run wyrd with manual inputs on Github Actions
        run: |
          wyrd "${{inputs.ix}}" "${{inputs.tx_id}}" "${{inputs.new_to_actual}}"

      - name: Commit and push results
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/close/raw/*.tsv
          git diff --staged --quiet && echo "Nothing to commit, skipping push" && exit 0
          git commit -m "wyrd $LE_DATE"
          git push
