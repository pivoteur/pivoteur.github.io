name: wyrd

on:
  workflow_dispatch:
    inputs:
      ix:
        description: 'ix row from table'
        required: true
        type: string
        default: '1'
      tx_id:
        description: 'Transaction ID'
        required: true
        type: string
        default: 'asdf'
      new_to_actual:
        description: 'New to actual value'
        required: true
        type: string
        default: '8008'

permissions:
  contents: write

jobs:
  run-wyrd:
    runs-on: ubuntu-latest
    env:
      DAPPS_DIR: "protocol/dapps"
      TARGET_DIR: "target/release"
      GIT_DAPPS_DIR: $GITHUB_WORKSPACE/$DAPPS_DIR
      GIT_RAW_URL: "https://raw.githubusercontent.com"
      PROTOCOL_URL: "$GIT_RAW_URL/pivoteur/pivoteur.github.io"

    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          path: protocol
          
      - name: Checkout crypto-n-rust
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: protocol/dapps/wyrd

      - name: Show input parameters
        run: |
          echo "=== Running wyrd with manual inputs ==="
          echo "ix: ${{ inputs.ix }}"
          echo "tx_id: ${{ inputs.tx_id }}"
          echo "new_to_actual: ${{ inputs.new_to_actual }}"

      - name: Build wyrd
        run: |
          cargo build --manifest-path $DAPPS_DIR/wyrd/Cargo.toml \
          --bin wyrd --release

      - name: Build appender
        run: |
          cargo build --manifest-path $DAPPS_DIR/appender/Cargo.toml \
          --bin appender --release

      - name: Add binary to PATH
        run: |
          echo "$GIT_DAPPS_DIR/wyrd/$TARGET_DIR" >> $GITHUB_PATH
          echo "$GIT_DAPPS_DIR/appender/$TARGET_DIR" >> $GITHUB_PATH

      - name: Set date and pivot_url
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=$PROTOCOL_URL" >> $GITHUB_ENV

      - name: Run wyrd
        run: |
          wyrd pivot data/pivots/close/raw "${{inputs.ix}}" \
          "${{inputs.tx_id}}" "${{inputs.new_to_actual}}" | appender

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/close/raw/*.tsv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "wyrd $LE_DATE"
          git push

