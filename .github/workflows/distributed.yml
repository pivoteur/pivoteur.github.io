name: distributed

on:
  workflow_dispatch:
    inputs:
      token_a:
        description: 'Distributed token, left side of pool (e.g. USDC)'
        required: true
        type: string
      token_b:
        description: 'Paired token, right side of pool (e.g. UNDEAD)'
        required: true
        type: string
      amount:
        description: 'Amount distributed to investor (e.g. 0.4349)'
        required: true
        type: string
      tweet_url:
        description: 'Tweet URL (default: x.com/pivocateur/status/2054570565474635869)'
        required: false
        type: string
        default: 'x.com/pivocateur/status/2054570565474635869'
      tx_url:
        description: 'Snowtrace tx URL (default: asdf)'
        required: false
        type: string
        default: 'asdf'
      send:
        description: 'Let Robbie send the message? (uncheck to display only)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  run-distributed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Cache distributed binary
        id: binary-cache
        uses: actions/cache@v3
        with:
          path: protocol/quizzes/src/quiz11/b_distributed/target/debug/b_distributed
          key: distributed-binary-${{ hashFiles('protocol/quizzes/src/quiz11/b_distributed/**/*.rs', 'protocol/quizzes/src/quiz11/b_distributed/Cargo.toml') }}

      - name: Set up Rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout crypto-n-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Show input parameters
        run: |
          echo "=== Running distributed with manual inputs ==="
          echo "token_a:   ${{ inputs.token_a }}"
          echo "token_b:   ${{ inputs.token_b }}"
          echo "amount:    ${{ inputs.amount }}"
          echo "tweet_url: ${{ inputs.tweet_url }}"
          echo "tx_url:    ${{ inputs.tx_url }}"
          echo "send:      ${{ inputs.send }}"

      - name: Build distributed
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path protocol/quizzes/src/quiz11/b_distributed/Cargo.toml --bin b_distributed

      - name: Add distributed to PATH
        run: echo "$GITHUB_WORKSPACE/protocol/quizzes/src/quiz11/b_distributed/target/debug" >> $GITHUB_PATH

      - name: Run distributed
        env:
          REINVESTED_BOT: ${{ secrets.REINVESTED_BOT }}
        run: |
          b_distributed "${{ inputs.token_a }}"  \
                        "${{ inputs.token_b }}"  \
                        "${{ inputs.amount }}"   \
                        "${{ inputs.tweet_url }}" \
                        "${{ inputs.tx_url }}"    \
                        "${{ inputs.send }}"
