name: distributed

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'Path to the shared investors TSV file'
        required: true
        type: string
      send:
        description: 'Let Robbie send the message? (uncheck to display only)'
        required: false
        type: boolean
        default: true

env:
  DAPP: distributed

jobs:
  run-distributed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Load Shared Environment Variables
        uses: doughepi/yaml-env-action@v1.0.0
        with:
          files: .github/config/protocol-env.yml

      - name: Establish app path
        run: echo "DAPP_DIR=$DAPPS_DIR/$DAPP" >> $GITHUB_ENV

      - name: Cache distributed binary
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: protocol/dapps/distributed/target/release/distributed
          key: >-
            distributed-binary-
            ${{ hashFiles(format('{0}/quiz11/b_distributed/**/*.rs', env.QUIZZES_SRC)) }}-
            ${{ hashFiles(format('{0}/Cargo.toml', env.DAPP_DIR)) }}-
            ${{ hashFiles(format('{0}/Cargo.lock', env.DAPP_DIR)) }}

      - name: Set up Rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout crypto-n-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Show input parameters
        run: |
          echo "=== Running distributed ==="
          echo "csv_path: ${{ inputs.csv_path }}"
          echo "send:     ${{ inputs.send }}"

      - name: Build distributed
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path $DAPP_DIR/Cargo.toml --bin $DAPP --release

      - name: Add distributed to PATH
        run: echo "$DAPP_DIR/$EXE_SUBDIR" >> $GITHUB_PATH

      - name: Run distributed
        env:
          REINVESTED_BOT:    ${{ secrets.PIVOT_PROTOCOL_ROBBIE }}
          INVESTOR_CHAT_IDS: ${{ secrets.INVESTOR_CHAT_IDS }}
        run: |
          $DAPP "${{ inputs.csv_path }}" "${{ inputs.send }}"
          