name: virr

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-virtsz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # Only needed to build virtsz
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          token: ${{ secrets.PIVOT_GIT_TOKEN }}
          path: protocol

      - name: Set up rust
        uses: dtolnay/rust-toolchain@stable
          
      - name: Checkout crypto-n-rust # needed for virtsz's `book` dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          token: ${{ secrets.PIVOT_GIT_TOKEN }}
          path: crypto-n-rust

      - name: Build virtsz 
        run: cargo build --manifest-path protocol/dapps/virtsz/Cargo.toml --bin virtsz 

      - name: Putting date into the env
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PATH=protocol/dapps/virtsz/target/debug:$PATH" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: Run virtsz
        run: |
          echo "current dir has the following"
          ls -l
          find . -name virtsz
          sh ./protocol/scripts/auto-virtsz.sh data/pivots/open/raw

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/open/raw/*.tsv
          git diff --staged --quiet && echo "Nothing to commit, skipping push" && exit 0
          git commit -m "virtsz $LE_DATE"
          git push
