name: convcls

on:
  workflow_dispatch:
    inputs:
      pool:
        description: 'Pool to convert'
        required: true
        type: choice
        options:
          - avax-undead
          - btc-avax
          - btc-eth
          - btc-undead
          - btc-usdc
          - eth-undead
          - undead-usdc
      dry_run:
        description: 'Dry run (print to stdout only, no commit)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  run-convcls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout crypto-n-rust
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Show inputs
        run: |
          echo "=== Running convcls with manual inputs ==="
          echo "pool:     ${{ inputs.pool }}"
          echo "dry_run:  ${{ inputs.dry_run }}"

      - name: Build convcls
        run: |
          cargo build --manifest-path protocol/dapps/convcls/Cargo.toml --bin convcls
          echo "$GITHUB_WORKSPACE/protocol/dapps/convcls/target/debug" >> $GITHUB_PATH

      - name: Run convcls
        run: |
          convcls data/pivots/open/raw/${{ inputs.pool }}.tsv \
                  data/pivots/close/raw/${{ inputs.pool }}.tsv


      - name: Set date 
        if: ${{ inputs.dry_run == false }}
        run: echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Commit and push results
        if: ${{ inputs.dry_run == false }}
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config user.name "$USER0_NAME"
          git config user.email "$USER0_EMAIL"
          git add data/pivots/close/raw/${{ inputs.pool }}.tsv
          git diff --staged --quiet && echo "Nothing to commit, skipping push" && exit 0
          git commit -m "convcls ${{ inputs.pool }} $LE_DATE"
          git push
