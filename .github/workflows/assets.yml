name: assets

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "57 04 * * *" # this is 12:57 AM Eastern Standard Time

permissions:
  contents: write

jobs:
  run-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # needed by cache step to locate Cargo.toml
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Cache assets binary
        id: binary-cache
        uses: actions/cache@v3
        with:
          path: protocol/dapps/assets/target/release/assets
          key: assets-binary-${{ hashFiles('protocol/dapps/assets/**/*.rs', 'protocol/dapps/assets/Cargo.toml', 'protocol/dapps/assets/Cargo.lock') }}

      - name: Install Rust toolchain
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout crypto-n-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Build assets
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path protocol/dapps/assets/Cargo.toml \
            --bin assets \
            --release

      - name: Add assets to PATH
        run: echo "$GITHUB_WORKSPACE/protocol/dapps/assets/target/release" >> $GITHUB_PATH

      - name: Set date and pivot_url
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: Run assets and log output
        run: assets pivot $LE_DATE >> data/assets.csv

      - name: Commit and push results
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/assets.csv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "assets $LE_DATE"
          git push
