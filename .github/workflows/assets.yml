name: assets

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "57 04 * * *" # this is 12:57 AM Eastern Standard Time

permissions:
  contents: write

jobs:
  run-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4
 
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
 
      - name: Cache Rust
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "protocol/dapps/assets -> target"

      - name: Checkout protocol # Only needed to build assets
        if: steps.rust-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol
 
      - name: Checkout crypto-n-rust # needed for assets' `book` dependencies
        if: steps.rust-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust
 
      - name: Build assets
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --path protocol/dapps/assets \
          --bin assets

      - name: Add binary to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Set date and pivot_url
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: Run assets and log output
        run: assets pivot $LE_DATE >> data/assets.csv

      - name: Commit and push results
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/assets.csv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "assets $LE_DATE"
          git push
