name: offrian

on:
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocol to counter-offer (e.g. PIVOT)'
        required: true
        type: string
      ix:
        description: 'Call index being countered (e.g. 1)'
        required: true
        type: string
      target:
        description: 'target volume of the new pivot (e.g. 1000)'
        required: true
        type: string
      debug:
        description: 'Show debug information?'
        required: false
        type: boolean
        default: false

env:
  DAPP: offrian

permissions:
  contents: write

jobs:
  run-offrian:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Load Shared Environment Variables
        uses: doughepi/yaml-env-action@v1.0.0
        with:
          files: .github/config/protocol-env.yml
          
      - name: Establish app path
        run: echo "DAPP_DIR=$DAPPS_DIR/$DAPP" >> $GITHUB_ENV

      - name: Establish git path
        run: echo "GIT_DAPP_DIR=$GITHUB_PATH/$DAPP_DIR" >> $GITHUB_ENV

      - name: Show input parameters
        run: |
          echo "=== Running offrian with manual inputs ==="
          echo "protocol: ${{ inputs.protocol }}"
          echo "ix:       ${{ inputs.ix }}"
          echo "target:   ${{ inputs.target }}"
          echo "debug:    ${{ inputs.debug }}"

      - name: Cache offrian binary
        id: binary-cache
        uses: actions/cache@v4
        with:
          path: $DAPP_DIR/target/release/$DAPP
          key: >-
            offrian-binary-
            ${{ hashFiles(format('{0}/quiz08/e_offrian/**/*.rs', env.QUIZZES_SRC)) }}-
            ${{ hashFiles(format('{0}/Cargo.toml', env.DAPP_DIR)) }}-
            ${{ hashFiles(format('{0}/Cargo.lock', env.DAPP_DIR)) }}

      - name: Install Rust toolchain
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout crypto-n-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Build offrian
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path $DAPP_DIR/Cargo.toml --bin $DAPP --release

      - name: Add offrian to PATH
        run: echo "$DAPP_DIR/$EXE_SUBDIR" >> $GITHUB_PATH

      - name: Set PIVOT_URL
        run: |
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: Run offrian
        run: |
          $DAPP ${{ inputs.debug && '--debug' || '' }} \
                  "${{ inputs.protocol }}" \
                  "${{ inputs.ix }}" \
                  "${{ inputs.target }}"
                  