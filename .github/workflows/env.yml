name: env

on:
  workflow_dispatch:

jobs:
  run-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Load Shared Environment Variables
        uses: doughepi/yaml-env-action@v1.0.0
        with:
          files: .github/config/protocol-env.yml

      - name: Verify Variables
        env: |
          USER0_NAME: ${{ vars.USER0_NAME }}
        run: |
          echo "User name is $USER0_NAME"
          echo "Date format to compute today's date is $DATE_FMT"
          echo "The protocol is referred to in dapps as $PROTOCOL_ALIAS"
          echo "Github data is accessible via $RAW_URL"

      - name: shows GITHUB_ENV and GITHUB_PATH
        run: |
          echo "GITHUB_ENV is $GITHUB_ENV"
          env
          echo "GITHUB_PATH is $GITHUB_PATH"
          echo $PATH
