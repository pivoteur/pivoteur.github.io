name: env

on:
  workflow_dispatch:

jobs:
  run-env:
    runs-on: ubuntu-latest
    steps:
      - name: Shows what the context expressions are
        run: |
          echo "github.repository_owner is ${{ github.repository_owner }}"
          echo "github.event.repository.name is ${{ github.event.repository.name }}"
          echo "github.repository is ${{ github.repository }}"

      - name: sets up environment
        run: echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: shows GITHUB_ENV and GITHUB_PATH
        run: |
          echo "GITHUB_ENV is $GITHUB_ENV"
          echo "GITHUB_PATH is $GITHUB_PATH"

      - name: show repository variables
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
        run: echo "USER0_NAME is $USER0_NAME
