name: hwaet

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "45 08 * * *" # this is 4:45 AM Eastern Standard Time

permissions:
  contents: write

jobs:
  run-hwaet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # needed by cache step to locate Cargo.toml
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Cache hwaet binary
        id: binary-cache
        uses: actions/cache@v3
        with:
          path: protocol/dapps/hwaet/target/release/hwaet
          key: hwaet-binary-${{ hashFiles('protocol/dapps/hwaet/**/*.rs', 'protocol/dapps/hwaet/Cargo.toml', 'protocol/dapps/hwaet/Cargo.lock') }}

      - name: Install Rust toolchain
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout crypto-n-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Build hwaet
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path protocol/dapps/hwaet/Cargo.toml \
            --bin hwaet \
            --release

      - name: Add hwaet to PATH
        run: echo "$GITHUB_WORKSPACE/protocol/dapps/hwaet/target/release" >> $GITHUB_PATH

      - name: Setting date and URL
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: Run hwaet
        run: hwaet pivot $LE_DATE > libs/pool-health.js

      - name: Commit and push results
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add libs/pool-health.js

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "hwaet $LE_DATE"
          git push
