name: reinvested

on:
  workflow_dispatch:
    inputs:
      token_a:
        description: 'Reinvested token, left side of pool (e.g. AVAX)'
        required: true
        type: string
      token_b:
        description: 'Paired token, right side of pool (e.g. BTC)'
        required: true
        type: string
      pivot_count:
        description: 'Number of pivots closed (e.g. 2)'
        required: true
        type: string
        default: '1'
      amount:
        description: 'Amount reinvested (e.g. 0.59)'
        required: true
        type: string
      url:
        description: 'Tweet URL'
        required: true
        type: string

jobs:
  run-reinvested:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # needed for lib dependencies
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout crypto-n-rust # needed for book dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Showing reinvested's vars
        run: |
          echo "=== Running reinvested with manual inputs ==="
          echo "token_a:     ${{ inputs.token_a }}"
          echo "token_b:     ${{ inputs.token_b }}"
          echo "pivot_count: ${{ inputs.pivot_count }}"
          echo "amount:      ${{ inputs.amount }}"
          echo "url:         ${{ inputs.url }}"

      - name: Build reinvested
        run: |
          cargo build --manifest-path protocol/dapps/reinvested/Cargo.toml --bin reinvested
          echo "$GITHUB_WORKSPACE/protocol/dapps/reinvested/target/debug" >> $GITHUB_PATH

      - name: Run reinvested
        env:
          REINVESTED_BOT: ${{ secrets.PIVOT_PROTOCOL_ROBBIE }}
        run: |
          reinvested "${{ inputs.token_a }}"     \
                     "${{ inputs.token_b }}"     \
                     "${{ inputs.pivot_count }}" \
                     "${{ inputs.amount }}"      \
                     "${{ inputs.url }}"

