name: virtsz

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "05 08 * * *" # this is 4:05 AM Eastern Standard Time

permissions:
  contents: write

jobs:
  run-virtsz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # Only needed to build virtsz
        uses: actions/checkout@v4
        with: 
          repository: pivoteur/protocol
          path: protocol

      - name: Checkout crypto-n-rust # needed for virtsz's `book` dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: protocol/dapps/virtsz

      - name: Build virtsz 
        run: |
          cargo build --manifest-path protocol/dapps/virtsz/Cargo.toml \
          --bin virtsz \
          --release --locked

      - name: Add binary to PATH
        run: echo "$GITHUB_WORKSPACE/protocol/dapps/virtsz/target/release" >> $GITHUB_PATH

      - name: Setting date
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Run virtsz
        run: |
          echo "Current directory contents:"
          ls -l
          echo "Looking for virtsz binary:"
          find . -name virtsz -type f
          
          sh ./protocol/scripts/auto-virtsz.sh pivot data/pivots/open/raw

      - name: Commit and push results
        env: 
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/open/raw/*.tsv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "virtsz $LE_DATE"
          git push
