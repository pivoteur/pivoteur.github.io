name: virtsz

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
    - cron: "47 03 * * *" # this is 11:47 AM Eastern Standard Time

permissions:
  contents: write

jobs:
  run-virtsz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io # This repo is the root dir for this workflow
        uses: actions/checkout@v4

      - name: Checkout protocol # needed by cache step to locate Cargo.toml
        uses: actions/checkout@v4
        with:
          repository: pivoteur/protocol
          path: protocol

      - name: Cache virtsz binary
        id: binary-cache
        uses: actions/cache@v3
        with:
          path: protocol/dapps/virtsz/target/release/virtsz
          key: virtsz-binary-${{ hashFiles('protocol/quizzes/src/quiz07/b_virtual/**/*.rs', 'protocol/dapps/virtsz/Cargo.toml', 'protocol/dapps/virtsz/Cargo.lock') }}

      - name: Install Rust toolchain
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Checkout crypto-n-rust
        if: steps.binary-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Build virtsz
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cargo build --manifest-path protocol/dapps/virtsz/Cargo.toml \
            --bin virtsz \
            --release

      - name: Add virtsz to PATH
        run: echo "$GITHUB_WORKSPACE/protocol/dapps/virtsz/target/release" >> $GITHUB_PATH

      - name: Set date and pivot_url
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: Run virtsz
        run: |
          echo "Current directory contents:"
          ls -l
          echo "Looking for virtsz binary:"
          find . -name virtsz -type f

          sh ./protocol/scripts/auto-virtsz.sh pivot data/pivots/open/raw

      - name: Commit and push results
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.name "$USER0_NAME"
          git config --local user.email "$USER0_EMAIL"
          git add data/pivots/open/raw/*.tsv

          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping push"
            exit 0
          fi

          git commit -m "virtsz $LE_DATE"
          git push
