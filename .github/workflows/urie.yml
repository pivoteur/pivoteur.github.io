name: clothes

on:
  workflow_dispatch:
    inputs:
      ix:
        description: 'ix row from table'
        required: true
        type: string
        default: '1'
      tx_id:
        description: 'Transaction ID'
        required: true
        type: string
        default: 'asdf'
      new_to_actual:
        description: 'New to actual value'
        required: true
        type: string
        default: '8008'

permissions:
  contents: write

jobs:
  run-urie:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: protocol
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "quizzes/src/quiz08/b_urie"

      - name: Set up rust
        uses: dtolnay/rust-toolchain@stable
      - name: Checkout crypto-n-rust # needed for `book` dependencies
        uses: actions/checkout@v4
        with:
          repository: logicalgraphs/crypto-n-rust
          path: crypto-n-rust

      - name: Showing urie's vars
        run: |
          echo "=== Running urie with manual inputs ==="
          echo "ix: ${{ inputs.ix }}"
          echo "tx_id: ${{ inputs.tx_id }}"
          echo "new_to_actual: ${{ inputs.new_to_actual }}"

      - name: Build urie
        run: |
          cargo build --manifest-path protocol/quizzes/src/quiz08/b_urie/Cargo.toml --bin urie
          echo "$GITHUB_WORKSPACE/protocol/quizzes/src/quiz08/b_urie/target/debug" >> $GITHUB_PATH

      - name: adding the date and pivot_url into the env
        run: |
          echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "PIVOT_URL=https://raw.githubusercontent.com/pivoteur/pivoteur.github.io" >> $GITHUB_ENV

      - name: run urie with manual inputs on Github Actions
        run: |
          urie "${{inputs.ix}}" "${{inputs.tx_id}}" "${{inputs.new_to_actual}}"
