name: github-issues

on:
  workflow_dispatch:
  # schedule:
    # cron ("Min Hour Day Month DayofWeek" in UTC) at a scheduled time
    # - cron: "40 04 * * *"

permissions:
  contents: write

jobs:
  issues-to-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pivoteur.github.io
        uses: actions/checkout@v4

      - name: Set today's date
        run: echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Count closed issues per repo
        run: |
          count_closed () {
            local repo="$1"
            curl -s \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/search/issues?q=repo:${repo}+is:issue+is:closed+closed:${LE_DATE}" \
              | jq '.total_count'
          }

          SITE_COUNT=$(count_closed "pivoteur/pivoteur.github.io")
          PROTOCOL_COUNT=$(count_closed "pivoteur/protocol")
          CRYPTO_COUNT=$(count_closed "logicalgraphs/crypto-n-rust")

          jq -n \
            --arg date "$LE_DATE" \
            --argjson site "$SITE_COUNT" \
            --argjson protocol "$PROTOCOL_COUNT" \
            --argjson crypto "$CRYPTO_COUNT" \
            '{date: $date, repos: {"pivoteur.github.io": $site, "protocol": $protocol, "crypto-n-rust": $crypto}}' \
            > libs/github-issues.json

      - name: Commit and push github-issues.json
        env:
          USER0_NAME: ${{ vars.USER0_NAME }}
          USER0_EMAIL: ${{ secrets.USER0_EMAIL }}
        run: |
          git config --local user.email "$USER0_EMAIL"
          git config --local user.name "$USER0_NAME"
          git add libs/github-issues.json
          git commit -m "Daily GitHub issues-closed JSON for $LE_DATE"
          git push
